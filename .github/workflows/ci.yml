name: CI / Build

on:
  push:
    branches: [main, develop, "feature/*"]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # テスト（Linux・高速）
  # ------------------------------------------------------------------ #
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhamlib-dev python3-hamlib \
            libgl1 libegl1 xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Run tests
        run: |
          xvfb-run -a pytest tests/ -v --tb=short
        env:
          DISPLAY: ":99"
          QT_QPA_PLATFORM: "offscreen"

  # ------------------------------------------------------------------ #
  # ビルド（タグpush時のみ）
  # ------------------------------------------------------------------ #
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-22.04
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm用

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            libusb-1.0-0-dev libxml2-dev swig python3.11-dev \
            libgl1 libegl1 libfuse2 \
            binutils coreutils

      - name: Build Hamlib 4.7.1 from source
        run: |
          HAMLIB_VER="4.7.1"
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          PYTAG=$(python3 -c "import sys; print(f'py{sys.version_info.major}{sys.version_info.minor}')")

          wget -q https://github.com/Hamlib/Hamlib/releases/download/${HAMLIB_VER}/hamlib-${HAMLIB_VER}.tar.gz
          tar -xzf hamlib-${HAMLIB_VER}.tar.gz

          # Hamlib 4.x autotools removed --enable-python; AX_PYTHON_DEVEL
          # detection fails on CI (setup-python prefix mismatch).
          # Strategy: build the C library via autotools, then use SWIG to
          # generate hamlib_wrap.c from bindings/hamlib.swg, and compile it.

          PY_INC=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))")
          PY_EXT=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('EXT_SUFFIX'))")

          echo "=== bindings/ ===" && ls hamlib-${HAMLIB_VER}/bindings/

          # --- Build 1: bundled (rpath = /opt/hamlib/4.7/lib for PyInstaller) ---
          cd hamlib-${HAMLIB_VER}
          ./configure --prefix=/opt/hamlib/4.7 --disable-static
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          cd ..

          # Generate SWIG Python wrapper from .swg sources
          # Note: -I flags must NOT have spaces between -I and the path
          swig -python -Wall \
            -I/opt/hamlib/4.7/include \
            -Ihamlib-${HAMLIB_VER}/bindings \
            -o hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -outdir hamlib-${HAMLIB_VER}/bindings \
            hamlib-${HAMLIB_VER}/bindings/hamlib.swg

          BUNDLED_PYSITE=/opt/hamlib/4.7/lib/python${PYVER}/site-packages
          sudo mkdir -p ${BUNDLED_PYSITE}
          sudo gcc -shared -fPIC -O2 \
            -I/opt/hamlib/4.7/include \
            -Ihamlib-${HAMLIB_VER}/include \
            -I${PY_INC} \
            hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -L/opt/hamlib/4.7/lib \
            -lhamlib \
            -Wl,-rpath,/opt/hamlib/4.7/lib \
            -o ${BUNDLED_PYSITE}/_Hamlib${PY_EXT}
          sudo cp hamlib-${HAMLIB_VER}/bindings/Hamlib.py ${BUNDLED_PYSITE}/

          # Copy bindings into CI Python's site-packages and verify import
          PY_SITE=$(python3 -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          cp ${BUNDLED_PYSITE}/Hamlib.py ${PY_SITE}/
          cp ${BUNDLED_PYSITE}/_Hamlib${PY_EXT} ${PY_SITE}/
          export LD_LIBRARY_PATH=/opt/hamlib/4.7/lib:${LD_LIBRARY_PATH}
          python3 -c "import Hamlib; print('Hamlib version:', Hamlib.hamlib_version)"

          # --- Build 2: portable (rpath = $ORIGIN for in-app user update) ---
          cd hamlib-${HAMLIB_VER}
          make clean
          ./configure \
            --prefix=/tmp/hamlib-portable \
            --disable-static \
            LDFLAGS="-Wl,-rpath,\$ORIGIN"
          make -j$(nproc)
          make install
          cd ..

          # Compile portable Python binding with $ORIGIN rpath (reuse SWIG-generated files)
          PORT_PYSITE=/tmp/hamlib-portable/lib/python${PYVER}/site-packages
          mkdir -p ${PORT_PYSITE}
          gcc -shared -fPIC -O2 \
            -I/tmp/hamlib-portable/include \
            -Ihamlib-${HAMLIB_VER}/include \
            -I${PY_INC} \
            hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -L/tmp/hamlib-portable/lib \
            -lhamlib \
            -Wl,-rpath,\$ORIGIN \
            -o ${PORT_PYSITE}/_Hamlib${PY_EXT}
          cp hamlib-${HAMLIB_VER}/bindings/Hamlib.py ${PORT_PYSITE}/

          # Package: all files flat so $ORIGIN works (libhamlib.so.4 next to _Hamlib.so)
          PKG="hamlib-linux-x86_64-${PYTAG}-${HAMLIB_VER}"
          mkdir -p ${PKG}
          SOFILE=$(ls /tmp/hamlib-portable/lib/libhamlib.so.4.*)
          cp ${SOFILE} ${PKG}/
          ln -sf $(basename ${SOFILE}) ${PKG}/libhamlib.so.4
          cp ${PORT_PYSITE}/Hamlib.py ${PKG}/
          cp ${PORT_PYSITE}/_Hamlib${PY_EXT} ${PKG}/
          echo "${HAMLIB_VER}" > ${PKG}/version.txt
          tar -czf ${PKG}.tar.gz ${PKG}/
          echo "HAMLIB_PORTABLE_PKG=${PKG}.tar.gz" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install -e ".[packaging]"

      - name: Build with PyInstaller
        run: |
          echo "${{ github.ref_name }}" | sed 's/^v//' > src/version.txt
          export LD_LIBRARY_PATH=/opt/hamlib/4.7/lib:${LD_LIBRARY_PATH}
          PYTHONPATH=src pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Create AppImage
        run: bash scripts/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/GPredict-Improved-x86_64.AppImage

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/GPredict-Improved-x86_64.AppImage
            ${{ env.HAMLIB_PORTABLE_PKG }}
          make_latest: true
          overwrite_files: true

  build-windows:
    name: Build Windows (.zip)
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -e ".[packaging]"

      - name: Build Hamlib 4.7.1 Python binding (MinGW) and portable package
        shell: pwsh
        run: |
          $HAMLIB_VER = "4.7.1"
          $PYTAG = python -c "import sys; print(f'py{sys.version_info.major}{sys.version_info.minor}')"
          $PY_INC  = python -c "import sysconfig; print(sysconfig.get_path('include'))"
          $PY_EXT  = python -c "import sysconfig; print(sysconfig.get_config_var('EXT_SUFFIX'))"
          $PY_SITE = python -c "import sysconfig; print(sysconfig.get_path('purelib'))"
          Write-Host "PY_INC=$PY_INC  PY_EXT=$PY_EXT"

          # Install SWIG (needed to generate hamlib_wrap.c from .swg sources)
          choco install swig -y --no-progress
          $env:PATH = "C:\ProgramData\chocolatey\bin;$env:PATH"

          # Download Hamlib source (for .swg binding sources) and Windows DLLs
          Invoke-WebRequest "https://github.com/Hamlib/Hamlib/releases/download/$HAMLIB_VER/hamlib-$HAMLIB_VER.tar.gz" -OutFile hamlib.tar.gz
          tar -xzf hamlib.tar.gz
          Invoke-WebRequest "https://github.com/Hamlib/Hamlib/releases/download/$HAMLIB_VER/hamlib-w64-$HAMLIB_VER.zip" -OutFile hamlib-win.zip
          Expand-Archive -Path hamlib-win.zip -DestinationPath hamlib-extracted
          $extracted = Get-ChildItem -Path hamlib-extracted -Directory | Select-Object -First 1
          $binDir = "$($extracted.FullName)\bin"
          $incDir = "$($extracted.FullName)\include"
          Write-Host "=== DLLs ===" ; Get-ChildItem "$binDir\*.dll" | Select-Object Name

          # Find Hamlib DLL
          $hamlibDll = Get-ChildItem "$binDir\*.dll" | Where-Object { $_.Name -match "hamlib" } | Select-Object -First 1
          Write-Host "Hamlib DLL: $($hamlibDll.FullName)"

          # Generate SWIG Python wrapper from .swg sources
          # Use Windows zip headers (pre-compiled, includes rig.h etc.) for SWIG
          $bindingsDir = "hamlib-$HAMLIB_VER\bindings"
          & swig -python -Wall `
            "-I$incDir" `
            "-I$bindingsDir" `
            -o "$bindingsDir\hamlib_wrap.c" `
            -outdir "$bindingsDir" `
            "$bindingsDir\hamlib.swg"
          if ($LASTEXITCODE -ne 0) { throw "swig failed" }
          Write-Host "SWIG generated: $(Get-Item $bindingsDir\hamlib_wrap.c)"

          # hamlib_wrap.c includes <hamlib/config.h> which is a build-time
          # autotools artifact not present in the Windows binary zip.
          # Create a minimal stub so GCC can compile the wrapper.
          $configH = "$incDir\hamlib\config.h"
          if (-not (Test-Path $configH)) {
            Write-Host "Creating stub $configH"
            $stub = "/* Minimal config.h stub for Windows MSVC */" + "`n" +
                    "#ifndef HAMLIB_CONFIG_H`n#define HAMLIB_CONFIG_H`n" +
                    "#define PACKAGE_VERSION `"4.7.1`"`n" +
                    "#define VERSION `"4.7.1`"`n" +
                    "#define PACKAGE `"hamlib`"`n" +
                    "#define PACKAGE_NAME `"Hamlib`"`n" +
                    "#define PACKAGE_STRING `"Hamlib 4.7.1`"`n" +
                    "#define PACKAGE_TARNAME `"hamlib`"`n" +
                    "#define PACKAGE_URL `"http://hamlib.org`"`n" +
                    "#endif`n"
            Set-Content -Path $configH -Value $stub -Encoding ASCII
          }

          # Compile _Hamlib.pyd with MinGW GCC (same toolchain as libhamlib-4.dll).
          # MinGW provides pthread.h natively; no stub needed.
          $gcc = "C:\mingw64\bin\gcc.exe"

          # Create MinGW-compatible import library for Python DLL
          $pythonDir = Split-Path (Get-Command python).Source
          $pyDll = Get-ChildItem $pythonDir -Filter "python3*.dll" |
                   Where-Object { $_.Name -match "^python3\d+\.dll$" } |
                   Select-Object -First 1
          Write-Host "Python DLL: $($pyDll.FullName)"
          $pyBase = [IO.Path]::GetFileNameWithoutExtension($pyDll.Name)
          & C:\mingw64\bin\gendef $pyDll.FullName
          & C:\mingw64\bin\dlltool -D $pyDll.Name -d "$pyBase.def" -l "lib$pyBase.dll.a"
          if ($LASTEXITCODE -ne 0) { throw "dlltool failed" }

          & $gcc -shared -O2 -DMS_WIN64 `
            "-I$incDir" "-I$PY_INC" `
            "$bindingsDir\hamlib_wrap.c" `
            "-L$binDir" "-lhamlib-4" `
            "-L." "-l$pyBase" `
            "-o" "_Hamlib$PY_EXT"
          if ($LASTEXITCODE -ne 0) { throw "gcc failed" }

          # Copy binding to site-packages; add DLL dir to PATH for import verification
          Copy-Item "$bindingsDir\Hamlib.py" "$PY_SITE\" -Force
          Copy-Item "_Hamlib$PY_EXT" "$PY_SITE\" -Force
          Copy-Item "$binDir\*.dll" "$PY_SITE\" -ErrorAction SilentlyContinue
          Copy-Item "C:\mingw64\bin\libgcc_s_seh-1.dll" "$PY_SITE\" -ErrorAction SilentlyContinue
          Copy-Item "C:\mingw64\bin\libwinpthread-1.dll" "$PY_SITE\" -ErrorAction SilentlyContinue
          $env:PATH = "$PY_SITE;$binDir;$env:PATH"
          python -c "import os; os.add_dll_directory(r'$PY_SITE'); os.add_dll_directory(r'$binDir'); import Hamlib; print('Hamlib version:', Hamlib.hamlib_version)"

          # --- Build portable flat package for in-app user update ---
          $pkgName = "hamlib-windows-x86_64-$PYTAG-$HAMLIB_VER"
          New-Item -ItemType Directory -Force -Path $pkgName | Out-Null
          Copy-Item "$binDir\*.dll" "$pkgName\" -ErrorAction SilentlyContinue
          Copy-Item "C:\mingw64\bin\libgcc_s_seh-1.dll" "$pkgName\" -ErrorAction SilentlyContinue
          Copy-Item "C:\mingw64\bin\libwinpthread-1.dll" "$pkgName\" -ErrorAction SilentlyContinue
          Copy-Item "hamlib-$HAMLIB_VER\bindings\Hamlib.py" "$pkgName\" -Force
          Copy-Item "_Hamlib$PY_EXT" "$pkgName\" -Force
          "$HAMLIB_VER" | Out-File -FilePath "$pkgName\version.txt" -Encoding ASCII -NoNewline
          Compress-Archive -Path "$pkgName\*" -DestinationPath "$pkgName.zip"
          "HAMLIB_PORTABLE_PKG=$pkgName.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append

      - name: Bundle SoapySDR for Windows (conda-forge pre-built)
        shell: pwsh
        run: |
          pip install zstandard -q

          # conda-forge package URLs (pinned for reproducibility)
          $packages = @(
            # SoapySDR core + Python 3.11 binding
            "https://conda.anaconda.org/conda-forge/win-64/soapysdr-0.8.1-py311haef1a59_6.conda",
            # RTL-SDR
            "https://conda.anaconda.org/conda-forge/win-64/rtl-sdr-2.0.2-h2466b09_3.conda",
            "https://conda.anaconda.org/conda-forge/win-64/soapysdr-module-rtlsdr-0.3.3-h0644a59_3.conda",
            # HackRF
            "https://conda.anaconda.org/conda-forge/win-64/libhackrf0-2026.01.3-hfd05255_0.conda",
            "https://conda.anaconda.org/conda-forge/win-64/soapysdr-module-hackrf-0.3.4-h23704b7_0.tar.bz2",
            # Airspy
            "https://conda.anaconda.org/conda-forge/win-64/libairspy-1.0.10-h2466b09_1.conda",
            "https://conda.anaconda.org/conda-forge/win-64/soapysdr-module-airspy-0.2.0-h23704b7_0.tar.bz2",
            # Airspy HF+
            "https://conda.anaconda.org/conda-forge/win-64/libairspyhf-1.6.8-h2466b09_1.conda",
            "https://conda.anaconda.org/conda-forge/win-64/soapysdr-module-airspyhf-0.2.0-h23704b7_0.tar.bz2"
          )

          New-Item -ItemType Directory -Force -Path soapy-win64\bin     | Out-Null
          New-Item -ItemType Directory -Force -Path soapy-win64\python   | Out-Null
          New-Item -ItemType Directory -Force -Path soapy-win64\modules  | Out-Null

          foreach ($url in $packages) {
            $fname = Split-Path $url -Leaf
            Write-Host "Downloading $fname ..."
            Invoke-WebRequest -Uri $url -OutFile $fname
          }

          python "$env:GITHUB_WORKSPACE\scripts\extract_soapy_conda.py"

          Write-Host "=== soapy-win64 contents ==="
          Get-ChildItem soapy-win64 -Recurse -File | Select-Object FullName

          # Verify SoapySDR import using the extracted .pyd
          $PY_SITE = python -c "import sysconfig; print(sysconfig.get_path('purelib'))"
          Copy-Item soapy-win64\python\* "$PY_SITE\" -Force
          Copy-Item soapy-win64\bin\*.dll "$PY_SITE\" -Force
          $env:SOAPY_SDR_PLUGIN_PATH = "$PWD\soapy-win64\modules"
          python -c "
          import os, sys
          os.add_dll_directory(r'$PY_SITE')
          import SoapySDR
          print('SoapySDR version:', SoapySDR.getAPIVersion())
          devs = SoapySDR.Device.enumerate()
          print('Detected devices:', len(devs))
          "

      - name: Build SoapyPlutoSDR for Windows (ADALM-Pluto support)
        shell: pwsh
        run: |
          # --- Step 1: get libiio DLL + headers via conda ---
          # We only install libiio + soapysdr here; cmake is NOT installed via conda
          # so the system cmake (which knows VS) is used later.
          $condaExe = $null
          foreach ($p in @(
            "$env:CONDA\Scripts\conda.exe",
            "C:\Miniconda3\Scripts\conda.exe",
            "C:\Miniconda\Scripts\conda.exe"
          )) {
            if (Test-Path $p) { $condaExe = $p; break }
          }
          if (-not $condaExe) { throw "conda not found on runner" }
          Write-Host "Using conda: $condaExe"

          $depsPrefix = "$PWD\pluto-deps"
          & $condaExe create -y -q --prefix $depsPrefix -c conda-forge --override-channels `
              "soapysdr=0.8.1" "libiio>=0.26"
          if ($LASTEXITCODE -ne 0) { throw "conda create failed" }

          $depsLib = "$depsPrefix\Library"

          # --- Step 2: set up MSVC compiler environment via vcvarsall ---
          # Use vswhere to locate VS, then run vcvarsall x64 and capture the env vars.
          # This makes cl.exe and link.exe available to cmake's Ninja generator.
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstall = & $vsWhere -latest -products * `
              -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
              -property installationPath 2>$null
          if (-not $vsInstall) { throw "Visual Studio with C++ tools not found via vswhere" }
          $vcvarsall = Join-Path $vsInstall "VC\Auxiliary\Build\vcvarsall.bat"
          Write-Host "vcvarsall: $vcvarsall"
          $envLines = & cmd /c "`"$vcvarsall`" x64 && set" 2>&1
          foreach ($line in $envLines) {
            if ($line -match '^([^=]+)=(.*)$') {
              [System.Environment]::SetEnvironmentVariable($Matches[1], $Matches[2], 'Process')
            }
          }
          Write-Host "MSVC environment ready. cl.exe: $((Get-Command cl.exe -ErrorAction SilentlyContinue)?.Source)"

          # --- Step 3: clone + build SoapyPlutoSDR with Ninja (MSVC toolchain) ---
          git clone --depth 1 https://github.com/pothosware/SoapyPlutoSDR.git "$PWD\SoapyPlutoSDR-src"
          if ($LASTEXITCODE -ne 0) { throw "git clone SoapyPlutoSDR failed" }

          # Use system cmake (full path, avoids any conda cmake in PATH).
          # Ninja generator: works without VS IDE; only needs cl.exe in PATH (set above).
          # No libad9361 -- not needed for amateur satellite sample rates (>260 kHz).
          $cmakeExe = "C:\Program Files\CMake\bin\cmake.exe"
          & $cmakeExe -S "$PWD\SoapyPlutoSDR-src" -B "$PWD\SoapyPlutoSDR-build" `
              -G Ninja `
              "-DCMAKE_BUILD_TYPE=Release" `
              "-DCMAKE_PREFIX_PATH=$depsLib"
          if ($LASTEXITCODE -ne 0) { throw "cmake configure failed" }

          & $cmakeExe --build "$PWD\SoapyPlutoSDR-build"
          if ($LASTEXITCODE -ne 0) { throw "cmake build failed" }

          # --- Step 4: copy outputs into soapy-win64 bundle directories ---
          # Note: SoapyPlutoSDR builds as "PlutoSDRSupport.dll" (not "SoapyPlutoSDR.dll").
          # SoapySDR loads all DLLs from SOAPY_SDR_PLUGIN_PATH regardless of filename.
          $builtDll = Get-ChildItem "$PWD\SoapyPlutoSDR-build" -Recurse -Filter "PlutoSDRSupport.dll" |
                      Select-Object -First 1
          if (-not $builtDll) { throw "PlutoSDRSupport.dll not found after build" }
          Copy-Item $builtDll.FullName "soapy-win64\modules\" -Force
          Copy-Item "$depsLib\bin\libiio.dll" "soapy-win64\bin\" -Force

          Write-Host "=== PlutoSDR bundle result ==="
          Write-Host "PlutoSDRSupport.dll: $(Test-Path 'soapy-win64\modules\PlutoSDRSupport.dll')"
          Write-Host "libiio.dll:          $(Test-Path 'soapy-win64\bin\libiio.dll')"

      - name: Disable Windows Defender and install NSIS
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          # NSIS is pre-installed on windows-latest runners; only install if missing.
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path "$nsisPath\makensis.exe") {
            Write-Host "NSIS already installed at $nsisPath"
          } else {
            Write-Host "NSIS not found, installing via Chocolatey..."
            $maxRetries = 3
            for ($i = 1; $i -le $maxRetries; $i++) {
              choco install nsis -y --no-progress
              if ($LASTEXITCODE -eq 0) { Write-Host "NSIS installed successfully"; break }
              if ($i -lt $maxRetries) {
                Write-Host "Attempt $i failed, retrying in 15 seconds..."
                Start-Sleep -Seconds 15
              } else {
                throw "NSIS installation failed after $maxRetries attempts"
              }
            }
          }

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          $ver | Out-File -FilePath src\version.txt -Encoding ASCII -NoNewline
          $env:PYTHONPATH = "src"
          pyinstaller scripts/gpredict-improved.spec --noconfirm --distpath dist
          if ($LASTEXITCODE -ne 0) { throw "pyinstaller failed" }
          $count = (Get-ChildItem dist -Recurse -File -ErrorAction SilentlyContinue).Count
          Write-Host "=== dist after PyInstaller: $count files ==="
          if ($count -eq 0) { throw "PyInstaller produced empty dist" }

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          # VIProductVersion requires X.X.X.X numeric format; strip pre-release suffix
          $numericVer = ($ver -replace '-.*$', '')
          $parts = $numericVer.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $viVer = ($parts[0..3] -join '.')
          makensis /DAPP_VERSION=$ver /DVIVERSION=$viVer scripts\installer.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed" }
          Write-Host "Installer built: dist\GPredict-Improved-Setup.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/GPredict-Improved-Setup.exe

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/GPredict-Improved-Setup.exe
            ${{ env.HAMLIB_PORTABLE_PKG }}
          make_latest: true
          overwrite_files: true

  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-14
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hamlib and Python dependencies
        run: |
          # Install build tools via Homebrew (swig generates hamlib_wrap.c from .swg)
          brew install autoconf automake libtool pkg-config libusb dylibbundler swig

          HAMLIB_VER="4.7.1"
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          PYTAG=$(python3 -c "import sys; print(f'py{sys.version_info.major}{sys.version_info.minor}')")
          ARCH=$(uname -m)  # arm64 or x86_64

          PY_INC=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))")
          PY_EXT=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('EXT_SUFFIX'))")

          # Download Hamlib source
          wget -q https://github.com/Hamlib/Hamlib/releases/download/${HAMLIB_VER}/hamlib-${HAMLIB_VER}.tar.gz
          tar -xzf hamlib-${HAMLIB_VER}.tar.gz

          echo "=== bindings/ ===" && ls hamlib-${HAMLIB_VER}/bindings/

          # --- Build 1: for PyInstaller bundle (standard prefix) ---
          cd hamlib-${HAMLIB_VER}
          ./configure --prefix=/usr/local/hamlib-bundle --disable-static
          make -j$(sysctl -n hw.logicalcpu)
          sudo make install
          cd ..

          # Generate SWIG Python wrapper from .swg sources
          # Note: -I flags must NOT have spaces between -I and the path
          swig -python -Wall \
            -I/usr/local/hamlib-bundle/include \
            -Ihamlib-${HAMLIB_VER}/bindings \
            -o hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -outdir hamlib-${HAMLIB_VER}/bindings \
            hamlib-${HAMLIB_VER}/bindings/hamlib.swg

          BUNDLED_PYSITE=/usr/local/hamlib-bundle/lib/python${PYVER}/site-packages
          sudo mkdir -p ${BUNDLED_PYSITE}
          sudo clang -shared -fPIC -O2 \
            -undefined dynamic_lookup \
            -I/usr/local/hamlib-bundle/include \
            -Ihamlib-${HAMLIB_VER}/include \
            -I${PY_INC} \
            hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -L/usr/local/hamlib-bundle/lib \
            -lhamlib \
            -Wl,-rpath,/usr/local/hamlib-bundle/lib \
            -o ${BUNDLED_PYSITE}/_Hamlib${PY_EXT}
          sudo cp hamlib-${HAMLIB_VER}/bindings/Hamlib.py ${BUNDLED_PYSITE}/

          # Copy bindings into CI Python's site-packages and verify
          PY_SITE=$(python3 -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          cp ${BUNDLED_PYSITE}/Hamlib.py ${PY_SITE}/
          cp ${BUNDLED_PYSITE}/_Hamlib${PY_EXT} ${PY_SITE}/
          DYLD_LIBRARY_PATH=/usr/local/hamlib-bundle/lib python3 -c "import Hamlib; print('Hamlib version:', Hamlib.hamlib_version)"

          # --- Build 2: portable with @loader_path for in-app user update ---
          cd hamlib-${HAMLIB_VER}
          make clean
          ./configure \
            --prefix=$HOME/hamlib-portable-mac \
            --disable-static \
            LDFLAGS="-Wl,-rpath,@loader_path"
          make -j$(sysctl -n hw.logicalcpu)
          make install
          cd ..

          # Compile portable Python binding (reuse SWIG-generated files)
          PORT_PYSITE=$HOME/hamlib-portable-mac/lib/python${PYVER}/site-packages
          mkdir -p ${PORT_PYSITE}
          clang -shared -fPIC -O2 \
            -undefined dynamic_lookup \
            -I$HOME/hamlib-portable-mac/include \
            -Ihamlib-${HAMLIB_VER}/include \
            -I${PY_INC} \
            hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -L$HOME/hamlib-portable-mac/lib \
            -lhamlib \
            -Wl,-rpath,@loader_path \
            -o ${PORT_PYSITE}/_Hamlib${PY_EXT}
          cp hamlib-${HAMLIB_VER}/bindings/Hamlib.py ${PORT_PYSITE}/

          PORTABLE_LIB=$HOME/hamlib-portable-mac/lib
          HAMLIB_SO=${PORT_PYSITE}/_Hamlib${PY_EXT}

          # Fix transitive dylib dependencies using dylibbundler so
          # the .so loads without Homebrew installed on the end user's machine.
          dylibbundler \
            --bundle-deps \
            --fix-file ${HAMLIB_SO} \
            --dest-dir ${PORTABLE_LIB}/deps \
            --install-path @loader_path/../deps \
            --overwrite-dir

          # Package flat: all dylibs + Hamlib.py + _Hamlib.so in one directory
          PKG="hamlib-macos-${ARCH}-${PYTAG}-${HAMLIB_VER}"
          mkdir -p ${PKG}
          cp ${PORT_PYSITE}/Hamlib.py ${PKG}/
          cp ${PORT_PYSITE}/_Hamlib${PY_EXT} ${PKG}/
          cp ${PORTABLE_LIB}/*.dylib ${PKG}/ 2>/dev/null || true
          # Fix rpath inside _Hamlib.so to point to @loader_path (flat layout)
          install_name_tool -add_rpath @loader_path "${PKG}/_Hamlib${PY_EXT}" 2>/dev/null || true
          echo "${HAMLIB_VER}" > ${PKG}/version.txt
          tar -czf ${PKG}.tar.gz ${PKG}/
          echo "HAMLIB_PORTABLE_PKG=${PKG}.tar.gz" >> $GITHUB_ENV

          pip install -e ".[packaging]"

      - name: Build with PyInstaller
        run: |
          echo "${{ github.ref_name }}" | sed 's/^v//' > src/version.txt
          PYTHONPATH=src pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Create DMG
        run: bash scripts/build-dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/GPredict-Improved.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/GPredict-Improved.dmg
            ${{ env.HAMLIB_PORTABLE_PKG }}
          make_latest: true

  # ------------------------------------------------------------------ #
  # Direwolf バンドルビルド（タグpush時のみ）
  # ------------------------------------------------------------------ #
  direwolf-linux:
    name: Bundle Direwolf (Linux)
    runs-on: ubuntu-22.04
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential libasound2-dev libgps-dev \
            libudev-dev libusb-1.0-0-dev

      - name: Build Direwolf from source
        run: |
          DVER="1.7"
          git clone --branch ${DVER} --depth 1 \
            https://github.com/wb2osz/direwolf.git direwolf-src

          cd direwolf-src
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/tmp/direwolf-install \
                ..
          make -j$(nproc)
          make install
          cd ../..

          # Flat layout: binary at archive root (find_direwolf() expects dir/direwolf)
          ARCH=$(uname -m)
          PKG_DIR=/tmp/direwolf-flat
          mkdir -p ${PKG_DIR}
          cp /tmp/direwolf-install/bin/direwolf ${PKG_DIR}/
          cp /tmp/direwolf-install/bin/atest    ${PKG_DIR}/ 2>/dev/null || true
          echo "${DVER}" > ${PKG_DIR}/version.txt

          PKG_NAME="direwolf-linux-${ARCH}.tar.gz"
          tar -czf ${PKG_NAME} -C ${PKG_DIR} .
          echo "DIREWOLF_PKG=${PKG_NAME}" >> $GITHUB_ENV

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ${{ env.DIREWOLF_PKG }}
          make_latest: false

  direwolf-windows:
    name: Bundle Direwolf (Windows)
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Direwolf from source (MinGW)
        shell: powershell
        run: |
          $DVER = "1.7"
          git clone --branch $DVER --depth 1 `
            https://github.com/wb2osz/direwolf.git direwolf-src

          cd direwolf-src
          New-Item -ItemType Directory build | Out-Null
          cd build
          # Use MinGW Makefiles available via Git for Windows / MSYS2
          cmake -G "MinGW Makefiles" `
                -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP\direwolf-install" `
                ..
          cmake --build . --config Release -j
          cmake --install .
          cd ..\..\

          # Flat layout: binary at archive root (find_direwolf() expects dir/direwolf.exe)
          $FLAT = "$env:RUNNER_TEMP\direwolf-flat"
          New-Item -ItemType Directory $FLAT | Out-Null
          Copy-Item "$env:RUNNER_TEMP\direwolf-install\bin\direwolf.exe" $FLAT\ -ErrorAction SilentlyContinue
          Copy-Item "$env:RUNNER_TEMP\direwolf-install\bin\*.dll"        $FLAT\ -ErrorAction SilentlyContinue
          $DVER | Out-File "$FLAT\version.txt" -NoNewline

          $PKG_NAME = "direwolf-windows-x86_64.zip"
          Compress-Archive -Path "$FLAT\*" -DestinationPath $PKG_NAME
          echo "DIREWOLF_PKG=$PKG_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ${{ env.DIREWOLF_PKG }}
          make_latest: false

  direwolf-macos:
    name: Bundle Direwolf (macOS)
    runs-on: macos-14
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install cmake portaudio

      - name: Build Direwolf from source
        run: |
          DVER="1.7"
          git clone --branch ${DVER} --depth 1 \
            https://github.com/wb2osz/direwolf.git direwolf-src

          cd direwolf-src
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/tmp/direwolf-install \
                ..
          make -j$(sysctl -n hw.logicalcpu)
          make install
          cd ../..

          # Flat layout: binary at archive root
          ARCH=$(uname -m)
          PKG_DIR=/tmp/direwolf-flat
          mkdir -p ${PKG_DIR}
          cp /tmp/direwolf-install/bin/direwolf ${PKG_DIR}/

          # Bundle portaudio dylib so Direwolf runs without Homebrew
          DBIN="${PKG_DIR}/direwolf"
          PORTAUDIO_DYLIB=$(otool -L "${DBIN}" | awk '/portaudio/{print $1}')
          if [ -n "${PORTAUDIO_DYLIB}" ]; then
            cp "${PORTAUDIO_DYLIB}" ${PKG_DIR}/
            DYLIB_NAME=$(basename "${PORTAUDIO_DYLIB}")
            install_name_tool -change "${PORTAUDIO_DYLIB}" "@executable_path/${DYLIB_NAME}" "${DBIN}"
          fi
          echo "${DVER}" > ${PKG_DIR}/version.txt

          PKG_NAME="direwolf-macos-${ARCH}.tar.gz"
          tar -czf ${PKG_NAME} -C ${PKG_DIR} .
          echo "DIREWOLF_PKG=${PKG_NAME}" >> $GITHUB_ENV

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ${{ env.DIREWOLF_PKG }}
          make_latest: false
          overwrite_files: true
