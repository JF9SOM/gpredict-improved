name: CI / Build

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # テスト（Linux・高速）
  # ------------------------------------------------------------------ #
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhamlib-dev python3-hamlib \
            libgl1 libegl1 xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Run tests
        run: |
          xvfb-run -a pytest tests/ -v --tb=short
        env:
          DISPLAY: ":99"
          QT_QPA_PLATFORM: "offscreen"

  # ------------------------------------------------------------------ #
  # ビルド（タグpush時のみ）
  # ------------------------------------------------------------------ #
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-22.04
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm用

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            libusb-1.0-0-dev libxml2-dev swig python3-dev \
            libgl1 libegl1 libfuse2 \
            binutils coreutils

      - name: Build Hamlib 4.7.1 from source
        run: |
          HAMLIB_VER="4.7.1"
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          PYTAG=$(python3 -c "import sys; print(f'py{sys.version_info.major}{sys.version_info.minor}')")

          wget -q https://github.com/Hamlib/Hamlib/releases/download/${HAMLIB_VER}/hamlib-${HAMLIB_VER}.tar.gz
          tar -xzf hamlib-${HAMLIB_VER}.tar.gz

          # --- Build 1: bundled (rpath = /opt/hamlib/4.7/lib for PyInstaller) ---
          cd hamlib-${HAMLIB_VER}
          ./configure \
            --prefix=/opt/hamlib/4.7 \
            --enable-python \
            --disable-static \
            PYTHON=$(which python3)
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          # Copy Python bindings into the CI Python's site-packages
          PY_SITE=$(python3 -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          cp -r /opt/hamlib/4.7/lib/python${PYVER}/site-packages/Hamlib* ${PY_SITE}/

          # --- Build 2: portable (rpath = $ORIGIN for in-app user update) ---
          make clean
          ./configure \
            --prefix=/tmp/hamlib-portable \
            --enable-python \
            --disable-static \
            LDFLAGS="-Wl,-rpath,\$ORIGIN" \
            PYTHON=$(which python3)
          make -j$(nproc)
          make install
          cd ..

          # Package: all files flat so $ORIGIN works (libhamlib.so.4 next to _Hamlib.so)
          PKG="hamlib-linux-x86_64-${PYTAG}-${HAMLIB_VER}"
          mkdir -p ${PKG}
          # Shared library
          SOFILE=$(ls /tmp/hamlib-portable/lib/libhamlib.so.4.*)
          cp ${SOFILE} ${PKG}/
          ln -sf $(basename ${SOFILE}) ${PKG}/libhamlib.so.4
          # Python binding
          cp /tmp/hamlib-portable/lib/python${PYVER}/site-packages/Hamlib.py ${PKG}/
          cp /tmp/hamlib-portable/lib/python${PYVER}/site-packages/_Hamlib*.so ${PKG}/
          # Version marker
          echo "${HAMLIB_VER}" > ${PKG}/version.txt
          tar -czf ${PKG}.tar.gz ${PKG}/
          echo "HAMLIB_PORTABLE_PKG=${PKG}.tar.gz" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install -e ".[packaging]"

      - name: Build with PyInstaller
        run: |
          export LD_LIBRARY_PATH=/opt/hamlib/4.7/lib:${LD_LIBRARY_PATH}
          PYTHONPATH=src pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Create AppImage
        run: bash scripts/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/GPredict-Improved-x86_64.AppImage

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GPredict-Improved-x86_64.AppImage
            ${{ env.HAMLIB_PORTABLE_PKG }}
          make_latest: true

  build-windows:
    name: Build Windows (.zip)
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -e ".[packaging]"

      - name: Download Hamlib 4.7.1 Windows binaries and build portable package
        shell: pwsh
        run: |
          $HAMLIB_VER = "4.7.1"
          $PYTAG = python -c "import sys; print(f'py{sys.version_info.major}{sys.version_info.minor}')"
          $url = "https://github.com/Hamlib/Hamlib/releases/download/${HAMLIB_VER}/hamlib-w32-${HAMLIB_VER}.zip"
          Invoke-WebRequest -Uri $url -OutFile hamlib.zip
          Expand-Archive -Path hamlib.zip -DestinationPath hamlib-extracted
          # Locate the extracted root directory (varies by release)
          $extracted = Get-ChildItem -Path hamlib-extracted -Directory | Select-Object -First 1
          Write-Host "Extracted to: $($extracted.FullName)"
          # Copy Python bindings into the CI Python's site-packages
          $sitePackages = python -c "import sysconfig; print(sysconfig.get_path('purelib'))"
          $pyFolders = @("python3.11", "python3.12", "python3", "python")
          foreach ($folder in $pyFolders) {
            $src = "$($extracted.FullName)\$folder"
            if (Test-Path $src) {
              Write-Host "Copying Hamlib Python bindings from $src"
              Copy-Item "$src\*" -Destination $sitePackages -Recurse -Force
              break
            }
          }
          # Verify Hamlib is importable
          python -c "import Hamlib; print('Hamlib version:', Hamlib.hamlib_version)"

          # --- Build portable flat package for in-app user update ---
          # Flat layout: all DLLs + .pyd + Hamlib.py in one directory.
          # Python loads the .pyd and os.add_dll_directory() makes the DLLs visible.
          $pkgName = "hamlib-windows-x86_64-${PYTAG}-${HAMLIB_VER}"
          New-Item -ItemType Directory -Force -Path $pkgName | Out-Null
          # Copy all DLLs from bin/
          Copy-Item "$($extracted.FullName)\bin\*.dll" -Destination $pkgName\ -ErrorAction SilentlyContinue
          # Copy Python bindings (.pyd + Hamlib.py) from the python3.X folder
          foreach ($folder in $pyFolders) {
            $src = "$($extracted.FullName)\$folder"
            if (Test-Path $src) {
              Copy-Item "$src\Hamlib.py" -Destination $pkgName\ -Force
              Copy-Item "$src\_Hamlib*.pyd" -Destination $pkgName\ -Force
              break
            }
          }
          # Version marker
          "${HAMLIB_VER}" | Out-File -FilePath "$pkgName\version.txt" -Encoding ascii -NoNewline
          # Zip flat (no sub-directory, unlike Linux tar.gz which has one)
          Compress-Archive -Path "${pkgName}\*" -DestinationPath "${pkgName}.zip"
          echo "HAMLIB_PORTABLE_PKG=${pkgName}.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\gpredict-improved\* `
            -DestinationPath dist\GPredict-Improved-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/GPredict-Improved-Windows.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GPredict-Improved-Windows.zip
            ${{ env.HAMLIB_PORTABLE_PKG }}
          make_latest: true

  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-14
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hamlib and Python dependencies
        run: |
          # Install build tools and Hamlib 4.7 source dependencies via Homebrew
          brew install autoconf automake libtool pkg-config libusb swig dylibbundler

          HAMLIB_VER="4.7.1"
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          PYTAG=$(python3 -c "import sys; print(f'py{sys.version_info.major}{sys.version_info.minor}')")
          ARCH=$(uname -m)  # arm64 or x86_64

          # Download Hamlib source
          wget -q https://github.com/Hamlib/Hamlib/releases/download/${HAMLIB_VER}/hamlib-${HAMLIB_VER}.tar.gz
          tar -xzf hamlib-${HAMLIB_VER}.tar.gz

          # --- Build 1: for PyInstaller bundle (standard prefix) ---
          cd hamlib-${HAMLIB_VER}
          ./configure \
            --prefix=/usr/local/hamlib-bundle \
            --enable-python \
            --disable-static \
            PYTHON=$(which python3)
          make -j$(sysctl -n hw.logicalcpu)
          sudo make install

          # Copy Python bindings into CI Python's site-packages (for PyInstaller collection)
          PY_SITE=$(python3 -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          cp /usr/local/hamlib-bundle/lib/python${PYVER}/site-packages/Hamlib* ${PY_SITE}/
          python3 -c "import Hamlib; print('Hamlib version:', Hamlib.hamlib_version)"

          # --- Build 2: portable with @loader_path for in-app user update ---
          make clean
          ./configure \
            --prefix=/tmp/hamlib-portable-mac \
            --enable-python \
            --disable-static \
            LDFLAGS="-Wl,-rpath,@loader_path" \
            PYTHON=$(which python3)
          make -j$(sysctl -n hw.logicalcpu)
          make install
          cd ..

          # Fix transitive dylib dependencies using dylibbundler so
          # the .so loads without Homebrew installed on the end user's machine.
          PORTABLE_LIB=/tmp/hamlib-portable-mac/lib
          HAMLIB_SO=$(ls ${PORTABLE_LIB}/python${PYVER}/site-packages/_Hamlib*.so)
          dylibbundler \
            --bundle-deps \
            --fix-file ${HAMLIB_SO} \
            --dest-dir ${PORTABLE_LIB} \
            --install-path @loader_path/.. \
            --overwrite-dir

          # Package flat: all dylibs + Hamlib.py + _Hamlib.so in one directory
          PKG="hamlib-macos-${ARCH}-${PYTAG}-${HAMLIB_VER}"
          mkdir -p ${PKG}
          cp ${PORTABLE_LIB}/python${PYVER}/site-packages/Hamlib.py ${PKG}/
          cp ${PORTABLE_LIB}/python${PYVER}/site-packages/_Hamlib*.so ${PKG}/
          cp ${PORTABLE_LIB}/*.dylib ${PKG}/ 2>/dev/null || true
          # Fix rpath inside _Hamlib.so to point to @loader_path (flat layout)
          install_name_tool -add_rpath @loader_path ${PKG}/_Hamlib*.so 2>/dev/null || true
          echo "${HAMLIB_VER}" > ${PKG}/version.txt
          tar -czf ${PKG}.tar.gz ${PKG}/
          echo "HAMLIB_PORTABLE_PKG=${PKG}.tar.gz" >> $GITHUB_ENV

          pip install -e ".[packaging]"

      - name: Build with PyInstaller
        run: |
          PYTHONPATH=src pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Create DMG
        run: bash scripts/build-dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/GPredict-Improved.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GPredict-Improved.dmg
            ${{ env.HAMLIB_PORTABLE_PKG }}
          make_latest: true
