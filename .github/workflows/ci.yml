name: CI / Build

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # テスト（Linux・高速）
  # ------------------------------------------------------------------ #
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhamlib-dev python3-hamlib \
            libgl1 libegl1 xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Run tests
        run: |
          xvfb-run -a pytest tests/ -v --tb=short
        env:
          DISPLAY: ":99"
          QT_QPA_PLATFORM: "offscreen"

  # ------------------------------------------------------------------ #
  # ビルド（タグpush時のみ）
  # ------------------------------------------------------------------ #
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-22.04
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm用

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhamlib-dev python3-hamlib \
            libgl1 libegl1 libfuse2 \
            binutils coreutils

      - name: Install Python dependencies
        run: pip install -e ".[packaging]"

      - name: Build with PyInstaller
        run: |
          PYTHONPATH=src pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Create AppImage
        run: bash scripts/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/GPredict-Improved-x86_64.AppImage

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GPredict-Improved-x86_64.AppImage
          prerelease: true
          make_latest: true

  build-windows:
    name: Build Windows (.zip)
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -e ".[packaging]"

      - name: Download Hamlib Windows binaries
        shell: pwsh
        run: |
          $url = "https://github.com/Hamlib/Hamlib/releases/download/4.6.2/hamlib-w64-4.6.2.zip"
          Invoke-WebRequest -Uri $url -OutFile hamlib.zip
          Expand-Archive -Path hamlib.zip -DestinationPath hamlib-extracted
          # Locate the extracted root directory (varies by release)
          $extracted = Get-ChildItem -Path hamlib-extracted -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path hamlib-win64\bin | Out-Null
          # Copy all DLLs
          Copy-Item "$($extracted.FullName)\bin\*.dll" -Destination hamlib-win64\bin\ -ErrorAction SilentlyContinue
          # Copy Python bindings (3.11 or generic python3 folder)
          $pyFolders = @("python3.11", "python3.12", "python3", "python")
          $sitePackages = python -c "import site; print(site.getsitepackages()[0])"
          foreach ($folder in $pyFolders) {
            $src = "$($extracted.FullName)\$folder"
            if (Test-Path $src) {
              Write-Host "Copying Hamlib Python bindings from $src"
              Copy-Item "$src\*" -Destination $sitePackages -Recurse -Force
              break
            }
          }

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\gpredict-improved\* `
            -DestinationPath dist\GPredict-Improved-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/GPredict-Improved-Windows.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GPredict-Improved-Windows.zip
          prerelease: true
          make_latest: true

  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-14
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hamlib and Python dependencies
        run: |
          brew install hamlib
          pip install -e ".[packaging]"

      - name: Build with PyInstaller
        run: |
          PYTHONPATH=src pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Create DMG
        run: bash scripts/build-dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/GPredict-Improved.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GPredict-Improved.dmg
          prerelease: true
          make_latest: true
