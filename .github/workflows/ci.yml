name: CI / Build

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # テスト（Linux・高速）
  # ------------------------------------------------------------------ #
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhamlib-dev python3-hamlib \
            libgl1 libegl1 xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Run tests
        run: |
          xvfb-run -a pytest tests/ -v --tb=short
        env:
          DISPLAY: ":99"
          QT_QPA_PLATFORM: "offscreen"

  # ------------------------------------------------------------------ #
  # ビルド（タグpush時のみ）
  # ------------------------------------------------------------------ #
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-22.04
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm用

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            libusb-1.0-0-dev libxml2-dev swig python3-dev \
            libgl1 libegl1 libfuse2 \
            binutils coreutils

      - name: Build Hamlib 4.7.1 from source
        run: |
          wget -q https://github.com/Hamlib/Hamlib/releases/download/4.7.1/hamlib-4.7.1.tar.gz
          tar -xzf hamlib-4.7.1.tar.gz
          cd hamlib-4.7.1
          ./configure \
            --prefix=/opt/hamlib/4.7 \
            --enable-python \
            --disable-static \
            PYTHON=$(which python3)
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          # Copy Python bindings into the CI Python's site-packages
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          PY_SITE=$(python3 -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          cp -r /opt/hamlib/4.7/lib/python${PYVER}/site-packages/Hamlib* ${PY_SITE}/

      - name: Install Python dependencies
        run: pip install -e ".[packaging]"

      - name: Build with PyInstaller
        run: |
          export LD_LIBRARY_PATH=/opt/hamlib/4.7/lib:${LD_LIBRARY_PATH}
          PYTHONPATH=src pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Create AppImage
        run: bash scripts/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/GPredict-Improved-x86_64.AppImage

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GPredict-Improved-x86_64.AppImage
          make_latest: true

  build-windows:
    name: Build Windows (.zip)
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -e ".[packaging]"

      - name: Download Hamlib 4.7.1 Windows binaries
        shell: pwsh
        run: |
          $url = "https://github.com/Hamlib/Hamlib/releases/download/4.7.1/hamlib-w32-4.7.1.zip"
          Invoke-WebRequest -Uri $url -OutFile hamlib.zip
          Expand-Archive -Path hamlib.zip -DestinationPath hamlib-extracted
          # Locate the extracted root directory (varies by release)
          $extracted = Get-ChildItem -Path hamlib-extracted -Directory | Select-Object -First 1
          Write-Host "Extracted to: $($extracted.FullName)"
          New-Item -ItemType Directory -Force -Path hamlib-win64\bin | Out-Null
          # Copy all DLLs (w32 package contains both 32-bit and 64-bit binaries)
          Copy-Item "$($extracted.FullName)\bin\*.dll" -Destination hamlib-win64\bin\ -ErrorAction SilentlyContinue
          # Copy Python bindings into the CI Python's site-packages
          $sitePackages = python -c "import sysconfig; print(sysconfig.get_path('purelib'))"
          $pyFolders = @("python3.11", "python3.12", "python3", "python")
          foreach ($folder in $pyFolders) {
            $src = "$($extracted.FullName)\$folder"
            if (Test-Path $src) {
              Write-Host "Copying Hamlib Python bindings from $src"
              Copy-Item "$src\*" -Destination $sitePackages -Recurse -Force
              break
            }
          }
          # Verify Hamlib is importable
          python -c "import Hamlib; print('Hamlib version:', Hamlib.hamlib_version)"

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\gpredict-improved\* `
            -DestinationPath dist\GPredict-Improved-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/GPredict-Improved-Windows.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GPredict-Improved-Windows.zip
          make_latest: true

  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-14
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hamlib and Python dependencies
        run: |
          brew install hamlib
          # Verify version is 4.7+
          HAMLIB_VER=$(hamlib-config --version 2>/dev/null || pkg-config --modversion hamlib 2>/dev/null || echo "unknown")
          echo "Hamlib version: ${HAMLIB_VER}"
          # Copy Python bindings into the CI Python's site-packages
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          PY_SITE=$(python3 -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          BREW_PREFIX=$(brew --prefix hamlib)
          if ls ${BREW_PREFIX}/lib/python${PYVER}/site-packages/Hamlib* 2>/dev/null; then
            cp ${BREW_PREFIX}/lib/python${PYVER}/site-packages/Hamlib* ${PY_SITE}/
          elif ls ${BREW_PREFIX}/lib/python3/site-packages/Hamlib* 2>/dev/null; then
            cp ${BREW_PREFIX}/lib/python3/site-packages/Hamlib* ${PY_SITE}/
          fi
          python3 -c "import Hamlib; print('Hamlib version:', Hamlib.hamlib_version)"
          pip install -e ".[packaging]"

      - name: Build with PyInstaller
        run: |
          PYTHONPATH=src pyinstaller scripts/gpredict-improved.spec --noconfirm

      - name: Create DMG
        run: bash scripts/build-dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/GPredict-Improved.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GPredict-Improved.dmg
          make_latest: true
