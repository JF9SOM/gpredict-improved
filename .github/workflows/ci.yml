name: CI / Build

on:
  push:
    branches: [main, develop, "feature/*"]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # テスト（Linux・高速）
  # ------------------------------------------------------------------ #
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhamlib-dev python3-hamlib \
            libgl1 libegl1 xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Run tests
        run: |
          xvfb-run -a pytest tests/ -v --tb=short
        env:
          DISPLAY: ":99"
          QT_QPA_PLATFORM: "offscreen"

  # ------------------------------------------------------------------ #
  # ビルド（タグpush時のみ）
  # ------------------------------------------------------------------ #
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-22.04
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm用

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            libusb-1.0-0-dev libxml2-dev swig python3.11-dev \
            libgl1 libegl1 libfuse2 \
            binutils coreutils

      - name: Build Hamlib 4.7.1 from source
        run: |
          HAMLIB_VER="4.7.1"
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          PYTAG=$(python3 -c "import sys; print(f'py{sys.version_info.major}{sys.version_info.minor}')")

          wget -q https://github.com/Hamlib/Hamlib/releases/download/${HAMLIB_VER}/hamlib-${HAMLIB_VER}.tar.gz
          tar -xzf hamlib-${HAMLIB_VER}.tar.gz

          # Hamlib 4.x autotools removed --enable-python; AX_PYTHON_DEVEL
          # detection fails on CI (setup-python prefix mismatch).
          # Strategy: build the C library via autotools, then use SWIG to
          # generate hamlib_wrap.c from bindings/hamlib.swg, and compile it.

          PY_INC=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))")
          PY_EXT=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('EXT_SUFFIX'))")

          echo "=== bindings/ ===" && ls hamlib-${HAMLIB_VER}/bindings/

          # --- Build 1: bundled (rpath = /opt/hamlib/4.7/lib for PyInstaller) ---
          cd hamlib-${HAMLIB_VER}
          ./configure --prefix=/opt/hamlib/4.7 --disable-static
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          cd ..

          # Generate SWIG Python wrapper from .swg sources
          # Note: -I flags must NOT have spaces between -I and the path
          swig -python -Wall \
            -I/opt/hamlib/4.7/include \
            -Ihamlib-${HAMLIB_VER}/bindings \
            -o hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -outdir hamlib-${HAMLIB_VER}/bindings \
            hamlib-${HAMLIB_VER}/bindings/hamlib.swg

          BUNDLED_PYSITE=/opt/hamlib/4.7/lib/python${PYVER}/site-packages
          sudo mkdir -p ${BUNDLED_PYSITE}
          sudo gcc -shared -fPIC -O2 \
            -I/opt/hamlib/4.7/include \
            -Ihamlib-${HAMLIB_VER}/include \
            -I${PY_INC} \
            hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -L/opt/hamlib/4.7/lib \
            -lhamlib \
            -Wl,-rpath,/opt/hamlib/4.7/lib \
            -o ${BUNDLED_PYSITE}/_Hamlib${PY_EXT}
          sudo cp hamlib-${HAMLIB_VER}/bindings/Hamlib.py ${BUNDLED_PYSITE}/

          # Copy bindings into CI Python's site-packages and verify import
          PY_SITE=$(python3 -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          cp ${BUNDLED_PYSITE}/Hamlib.py ${PY_SITE}/
          cp ${BUNDLED_PYSITE}/_Hamlib${PY_EXT} ${PY_SITE}/
          export LD_LIBRARY_PATH=/opt/hamlib/4.7/lib:${LD_LIBRARY_PATH}
          python3 -c "import Hamlib; print('Hamlib version:', Hamlib.hamlib_version)"

          # --- Build 2: portable (rpath = $ORIGIN for in-app user update) ---
          cd hamlib-${HAMLIB_VER}
          make clean
          ./configure \
            --prefix=/tmp/hamlib-portable \
            --disable-static \
            LDFLAGS="-Wl,-rpath,\$ORIGIN"
          make -j$(nproc)
          make install
          cd ..

          # Compile portable Python binding with $ORIGIN rpath (reuse SWIG-generated files)
          PORT_PYSITE=/tmp/hamlib-portable/lib/python${PYVER}/site-packages
          mkdir -p ${PORT_PYSITE}
          gcc -shared -fPIC -O2 \
            -I/tmp/hamlib-portable/include \
            -Ihamlib-${HAMLIB_VER}/include \
            -I${PY_INC} \
            hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -L/tmp/hamlib-portable/lib \
            -lhamlib \
            -Wl,-rpath,\$ORIGIN \
            -o ${PORT_PYSITE}/_Hamlib${PY_EXT}
          cp hamlib-${HAMLIB_VER}/bindings/Hamlib.py ${PORT_PYSITE}/

          # Package: all files flat so $ORIGIN works (libhamlib.so.4 next to _Hamlib.so)
          PKG="hamlib-linux-x86_64-${PYTAG}-${HAMLIB_VER}"
          mkdir -p ${PKG}
          SOFILE=$(ls /tmp/hamlib-portable/lib/libhamlib.so.4.*)
          cp ${SOFILE} ${PKG}/
          ln -sf $(basename ${SOFILE}) ${PKG}/libhamlib.so.4
          cp ${PORT_PYSITE}/Hamlib.py ${PKG}/
          cp ${PORT_PYSITE}/_Hamlib${PY_EXT} ${PKG}/
          echo "${HAMLIB_VER}" > ${PKG}/version.txt
          tar -czf ${PKG}.tar.gz ${PKG}/
          echo "HAMLIB_PORTABLE_PKG=${PKG}.tar.gz" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install -e ".[packaging]"

      - name: Download Direwolf bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(uname -m)
          mkdir -p direwolf-bundle
          gh release download direwolf-bundle \
            --repo "${{ github.repository }}" \
            --pattern "direwolf-linux-${ARCH}.tar.gz" \
            --dir /tmp/dw-dl
          tar -xzf /tmp/dw-dl/direwolf-linux-${ARCH}.tar.gz -C /tmp/dw-dl
          cp /tmp/dw-dl/direwolf direwolf-bundle/
          chmod +x direwolf-bundle/direwolf
          echo "Direwolf version: $(cat /tmp/dw-dl/version.txt)"

      - name: Download q65lib bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(uname -m)
          mkdir -p q65lib-bundle
          gh release download q65lib-bundle \
            --repo "${{ github.repository }}" \
            --pattern "q65lib-linux-${ARCH}.tar.gz" \
            --dir /tmp/q65-dl 2>/dev/null || { echo "q65lib bundle not found; skipping"; exit 0; }
          tar -xzf /tmp/q65-dl/q65lib-linux-${ARCH}.tar.gz -C /tmp/q65-dl
          cp /tmp/q65-dl/*.so q65lib-bundle/ 2>/dev/null || true
          echo "q65lib version: $(cat /tmp/q65-dl/version.txt 2>/dev/null || echo unknown)"

      - name: Build with PyInstaller
        run: |
          echo "${{ github.ref_name }}" | sed 's/^v//' > src/version.txt
          export LD_LIBRARY_PATH=/opt/hamlib/4.7/lib:${LD_LIBRARY_PATH}
          PYTHONPATH=src pyinstaller scripts/fbsat59.spec --noconfirm

      - name: Create AppImage
        run: bash scripts/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/FBSAT59-x86_64.AppImage

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: dist/FBSAT59-x86_64.AppImage
          make_latest: true
          overwrite_files: true

      - name: Upload Hamlib bundle to hamlib-bundle release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view hamlib-bundle \
            --repo "${{ github.repository }}" 2>/dev/null || \
          gh release create hamlib-bundle \
            --repo "${{ github.repository }}" \
            --title "Hamlib Bundle" \
            --notes "Pre-built Hamlib for use with Help > Hamlib Update…" \
            --prerelease
          gh release upload hamlib-bundle \
            --repo "${{ github.repository }}" \
            --clobber \
            "${{ env.HAMLIB_PORTABLE_PKG }}"

  build-windows:
    name: Build Windows (.zip)
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -e ".[packaging]"

      - name: Build Hamlib 4.7.1 Python binding (MinGW) and portable package
        shell: pwsh
        run: |
          $HAMLIB_VER = "4.7.1"
          $PYTAG = python -c "import sys; print(f'py{sys.version_info.major}{sys.version_info.minor}')"
          $PY_INC  = python -c "import sysconfig; print(sysconfig.get_path('include'))"
          $PY_EXT  = python -c "import sysconfig; print(sysconfig.get_config_var('EXT_SUFFIX'))"
          $PY_SITE = python -c "import sysconfig; print(sysconfig.get_path('purelib'))"
          Write-Host "PY_INC=$PY_INC  PY_EXT=$PY_EXT"

          # Install SWIG (needed to generate hamlib_wrap.c from .swg sources)
          choco install swig -y --no-progress
          $env:PATH = "C:\ProgramData\chocolatey\bin;$env:PATH"

          # Download Hamlib source (for .swg binding sources) and Windows DLLs
          Invoke-WebRequest "https://github.com/Hamlib/Hamlib/releases/download/$HAMLIB_VER/hamlib-$HAMLIB_VER.tar.gz" -OutFile hamlib.tar.gz
          tar -xzf hamlib.tar.gz
          Invoke-WebRequest "https://github.com/Hamlib/Hamlib/releases/download/$HAMLIB_VER/hamlib-w64-$HAMLIB_VER.zip" -OutFile hamlib-win.zip
          Expand-Archive -Path hamlib-win.zip -DestinationPath hamlib-extracted
          $extracted = Get-ChildItem -Path hamlib-extracted -Directory | Select-Object -First 1
          $binDir = "$($extracted.FullName)\bin"
          $incDir = "$($extracted.FullName)\include"
          Write-Host "=== DLLs ===" ; Get-ChildItem "$binDir\*.dll" | Select-Object Name

          # Find Hamlib DLL
          $hamlibDll = Get-ChildItem "$binDir\*.dll" | Where-Object { $_.Name -match "hamlib" } | Select-Object -First 1
          Write-Host "Hamlib DLL: $($hamlibDll.FullName)"

          # Generate SWIG Python wrapper from .swg sources
          # Use Windows zip headers (pre-compiled, includes rig.h etc.) for SWIG
          $bindingsDir = "hamlib-$HAMLIB_VER\bindings"
          & swig -python -Wall `
            "-I$incDir" `
            "-I$bindingsDir" `
            -o "$bindingsDir\hamlib_wrap.c" `
            -outdir "$bindingsDir" `
            "$bindingsDir\hamlib.swg"
          if ($LASTEXITCODE -ne 0) { throw "swig failed" }
          Write-Host "SWIG generated: $(Get-Item $bindingsDir\hamlib_wrap.c)"

          # hamlib_wrap.c includes <hamlib/config.h> which is a build-time
          # autotools artifact not present in the Windows binary zip.
          # Create a minimal stub so GCC can compile the wrapper.
          $configH = "$incDir\hamlib\config.h"
          if (-not (Test-Path $configH)) {
            Write-Host "Creating stub $configH"
            $stub = "/* Minimal config.h stub for Windows MSVC */" + "`n" +
                    "#ifndef HAMLIB_CONFIG_H`n#define HAMLIB_CONFIG_H`n" +
                    "#define PACKAGE_VERSION `"4.7.1`"`n" +
                    "#define VERSION `"4.7.1`"`n" +
                    "#define PACKAGE `"hamlib`"`n" +
                    "#define PACKAGE_NAME `"Hamlib`"`n" +
                    "#define PACKAGE_STRING `"Hamlib 4.7.1`"`n" +
                    "#define PACKAGE_TARNAME `"hamlib`"`n" +
                    "#define PACKAGE_URL `"http://hamlib.org`"`n" +
                    "#endif`n"
            Set-Content -Path $configH -Value $stub -Encoding ASCII
          }

          # Compile _Hamlib.pyd with MinGW GCC (same toolchain as libhamlib-4.dll).
          # MinGW provides pthread.h natively; no stub needed.
          $gcc = "C:\mingw64\bin\gcc.exe"

          # Create MinGW-compatible import library for Python DLL
          $pythonDir = Split-Path (Get-Command python).Source
          $pyDll = Get-ChildItem $pythonDir -Filter "python3*.dll" |
                   Where-Object { $_.Name -match "^python3\d+\.dll$" } |
                   Select-Object -First 1
          Write-Host "Python DLL: $($pyDll.FullName)"
          $pyBase = [IO.Path]::GetFileNameWithoutExtension($pyDll.Name)
          & C:\mingw64\bin\gendef $pyDll.FullName
          & C:\mingw64\bin\dlltool -D $pyDll.Name -d "$pyBase.def" -l "lib$pyBase.dll.a"
          if ($LASTEXITCODE -ne 0) { throw "dlltool failed" }

          & $gcc -shared -O2 -DMS_WIN64 `
            "-I$incDir" "-I$PY_INC" `
            "$bindingsDir\hamlib_wrap.c" `
            "-L$binDir" "-lhamlib-4" `
            "-L." "-l$pyBase" `
            "-o" "_Hamlib$PY_EXT"
          if ($LASTEXITCODE -ne 0) { throw "gcc failed" }

          # Copy binding to site-packages; add DLL dir to PATH for import verification
          Copy-Item "$bindingsDir\Hamlib.py" "$PY_SITE\" -Force
          Copy-Item "_Hamlib$PY_EXT" "$PY_SITE\" -Force
          Copy-Item "$binDir\*.dll" "$PY_SITE\" -ErrorAction SilentlyContinue
          Copy-Item "C:\mingw64\bin\libgcc_s_seh-1.dll" "$PY_SITE\" -ErrorAction SilentlyContinue
          Copy-Item "C:\mingw64\bin\libwinpthread-1.dll" "$PY_SITE\" -ErrorAction SilentlyContinue
          $env:PATH = "$PY_SITE;$binDir;$env:PATH"
          python -c "import os; os.add_dll_directory(r'$PY_SITE'); os.add_dll_directory(r'$binDir'); import Hamlib; print('Hamlib version:', Hamlib.hamlib_version)"

          # --- Build portable flat package for in-app user update ---
          $pkgName = "hamlib-windows-x86_64-$PYTAG-$HAMLIB_VER"
          New-Item -ItemType Directory -Force -Path $pkgName | Out-Null
          Copy-Item "$binDir\*.dll" "$pkgName\" -ErrorAction SilentlyContinue
          Copy-Item "C:\mingw64\bin\libgcc_s_seh-1.dll" "$pkgName\" -ErrorAction SilentlyContinue
          Copy-Item "C:\mingw64\bin\libwinpthread-1.dll" "$pkgName\" -ErrorAction SilentlyContinue
          Copy-Item "hamlib-$HAMLIB_VER\bindings\Hamlib.py" "$pkgName\" -Force
          Copy-Item "_Hamlib$PY_EXT" "$pkgName\" -Force
          "$HAMLIB_VER" | Out-File -FilePath "$pkgName\version.txt" -Encoding ASCII -NoNewline
          Compress-Archive -Path "$pkgName\*" -DestinationPath "$pkgName.zip"
          "HAMLIB_PORTABLE_PKG=$pkgName.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append

      - name: Bundle SoapySDR for Windows (conda-forge pre-built)
        shell: pwsh
        run: |
          pip install zstandard -q

          # conda-forge package URLs (pinned for reproducibility).
          # PlutoSDR (ADALM-Pluto) is intentionally excluded: SoapyPlutoSDR requires
          # a separate libiio build and caused CI instability; omit for now.
          $packages = @(
            # SoapySDR core + Python 3.11 binding
            "https://conda.anaconda.org/conda-forge/win-64/soapysdr-0.8.1-py311haef1a59_6.conda",
            # RTL-SDR: omitted here; built from Osmocom source in the next step
            # HackRF
            "https://conda.anaconda.org/conda-forge/win-64/libhackrf0-2026.01.3-hfd05255_0.conda",
            "https://conda.anaconda.org/conda-forge/win-64/soapysdr-module-hackrf-0.3.4-h23704b7_0.tar.bz2",
            # Airspy
            "https://conda.anaconda.org/conda-forge/win-64/libairspy-1.0.10-h2466b09_1.conda",
            "https://conda.anaconda.org/conda-forge/win-64/soapysdr-module-airspy-0.2.0-h23704b7_0.tar.bz2",
            # Airspy HF+
            "https://conda.anaconda.org/conda-forge/win-64/libairspyhf-1.6.8-h2466b09_1.conda",
            "https://conda.anaconda.org/conda-forge/win-64/soapysdr-module-airspyhf-0.2.0-h23704b7_0.tar.bz2"
          )

          New-Item -ItemType Directory -Force -Path soapy-win64\bin     | Out-Null
          New-Item -ItemType Directory -Force -Path soapy-win64\python   | Out-Null
          New-Item -ItemType Directory -Force -Path soapy-win64\modules  | Out-Null

          foreach ($url in $packages) {
            $fname = Split-Path $url -Leaf
            Write-Host "Downloading $fname ..."
            Invoke-WebRequest -Uri $url -OutFile $fname
          }

          python "$env:GITHUB_WORKSPACE\scripts\extract_soapy_conda.py"

          Write-Host "=== soapy-win64 contents ==="
          Get-ChildItem soapy-win64 -Recurse -File | Select-Object FullName

          # Ensure hackrf.dll is present in soapy-win64/bin/ for the ctypes bypass.
          # conda-forge libhackrf0 should have placed it there; if not (e.g. different
          # DLL name in the package), search broadly and copy under the canonical name.
          $hackrfDll = Get-ChildItem "soapy-win64\bin" -Filter "hackrf*.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $hackrfDll) {
            Write-Host "hackrf.dll not found in soapy-win64\bin — searching conda pkgs..."
            $hackrfDll = Get-ChildItem . -Recurse -Filter "hackrf*.dll" -ErrorAction SilentlyContinue |
                         Where-Object { $_.FullName -notlike "*soapy-win64\modules*" } |
                         Select-Object -First 1
          }
          if ($hackrfDll) {
            if ($hackrfDll.Name -ne "hackrf.dll") {
              Copy-Item $hackrfDll.FullName "soapy-win64\bin\hackrf.dll" -Force
              Write-Host "Copied $($hackrfDll.Name) -> soapy-win64\bin\hackrf.dll"
            } else {
              Write-Host "hackrf.dll already at: $($hackrfDll.FullName)"
            }
          } else {
            Write-Host "hackrf.dll not found in conda packages — downloading from HackRF releases..."
            $hackrfZip = "hackrf-2024.02.1-win.zip"
            $hackrfUrl = "https://github.com/greatscottgadgets/hackrf/releases/download/v2024.02.1/$hackrfZip"
            Invoke-WebRequest -Uri $hackrfUrl -OutFile $hackrfZip
            Expand-Archive -Path $hackrfZip -DestinationPath hackrf-release -Force
            $hackrfDll = Get-ChildItem hackrf-release -Recurse -Filter "hackrf.dll" | Select-Object -First 1
            if ($hackrfDll) {
              Copy-Item $hackrfDll.FullName "soapy-win64\bin\hackrf.dll" -Force
              Write-Host "Downloaded and installed hackrf.dll from HackRF releases."
            } else {
              throw "hackrf.dll not found in HackRF release archive — cannot continue."
            }
          }

          # Verify SoapySDR import using the extracted .pyd
          $PY_SITE = python -c "import sysconfig; print(sysconfig.get_path('purelib'))"
          Copy-Item soapy-win64\python\* "$PY_SITE\" -Force
          Copy-Item soapy-win64\bin\*.dll "$PY_SITE\" -Force
          $env:SOAPY_SDR_PLUGIN_PATH = "$PWD\soapy-win64\modules"
          python -c "
          import os, sys
          os.add_dll_directory(r'$PY_SITE')
          import SoapySDR
          print('SoapySDR version:', SoapySDR.getAPIVersion())
          devs = SoapySDR.Device.enumerate()
          print('Detected devices:', len(devs))
          "

      - name: Build SoapyRTLSDR from Osmocom source (Windows)
        shell: pwsh
        run: |
          # Both conda-forge and Osmocom librtlsdr 2.0.2 fail to read USB string
          # descriptors under WinUSB (libusb limitation).  SoapyRTLSDR's findDevices()
          # skips such devices → enumerate() returns [] → make() "no match".
          # We build SoapyRTLSDR from source and patch Registration.cpp to ignore
          # the rtlsdr_get_device_usb_strings() return value so devices are always
          # added with empty strings; matching then falls back to device_index.

          # conda env with SoapySDR dev headers/libs (same version as our bundle).
          # Use the full path to conda.exe — the shell function is not initialized.
          $condaExe = if ($env:CONDA) { "$env:CONDA\Scripts\conda.exe" } else { $null }
          if (-not $condaExe -or -not (Test-Path $condaExe)) {
            $condaExe = @(
              "C:\Miniconda3\Scripts\conda.exe",
              "C:\ProgramData\Miniconda3\Scripts\conda.exe",
              "C:\Miniconda\Scripts\conda.exe"
            ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $condaExe) { throw "conda.exe not found on runner" }
          Write-Host "conda: $condaExe"
          # SoapySDR is intentionally excluded here.  rtlsdrSupport.dll must be
          # compiled against the same SoapySDR build that is bundled as SoapySDR.dll
          # (soapysdr-0.8.1-py311haef1a59_6.conda).  Using a different conda build
          # of soapysdr embeds a different SOAPY_SDR_ABI_VERSION in rtlsdrSupport.dll
          # which causes a "failed ABI check" at runtime → plugin is silently rejected
          # → Device::make() throws "no match".
          # The correct SoapySDR SDK (headers + .lib + cmake) is extracted from the
          # pinned conda package by extract_soapy_conda.py in the Bundle step above
          # into soapy-win64/sdk/, and passed via CMAKE_PREFIX_PATH below.
          & $condaExe create --prefix rtlsdr-deps -c conda-forge "libusb" --yes --quiet

          # Find MSVC vcvarsall and activate x64 environment
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * `
                      -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
                      -property installationPath
          $vcvarsall = "$vsPath\VC\Auxiliary\Build\vcvarsall.bat"
          Write-Host "vcvarsall: $vcvarsall"
          $vcEnv = cmd /c "`"$vcvarsall`" x64 && set" 2>&1
          foreach ($line in $vcEnv) {
            if ($line -match '^([^=]+)=(.*)$') {
              [System.Environment]::SetEnvironmentVariable($Matches[1], $Matches[2], 'Process')
            }
          }

          # Use system cmake (NOT conda cmake, which breaks VS detection)
          $CMAKE = "C:\Program Files\CMake\bin\cmake.exe"

          # --- Build librtlsdr and install to local prefix ---
          # Use RTL-SDR Blog fork: it contains WinUSB-specific fixes that
          # allow rtlsdr_open() to succeed under the WinUSB driver on Windows.
          # Osmocom HEAD fails because libusb_get_device_list returns 0 devices
          # on the first real open attempt under WinUSB.
          git clone https://github.com/rtlsdrblog/rtl-sdr-blog --depth 1 rtl-sdr
          # conda-forge libusb puts headers in include/libusb-1.0/libusb.h.
          # cmake's FindLibUSB.cmake finds the .lib but may not set INCLUDE_DIRS
          # correctly without pkg-config (not available on Windows runners).
          # Pass them explicitly so cl.exe gets the /I flag.
          $libusbInc = "$PWD\rtlsdr-deps\Library\include\libusb-1.0"
          $libusbLib = (Get-ChildItem "$PWD\rtlsdr-deps\Library\lib" -Filter "*usb*1*.lib" |
                        Select-Object -First 1).FullName
          if (-not $libusbLib) { $libusbLib = "$PWD\rtlsdr-deps\Library\lib\usb-1.0.lib" }
          Write-Host "libusb include: $libusbInc"
          Write-Host "libusb lib:     $libusbLib"

          & $CMAKE -G Ninja -B rtlsdr-build -S rtl-sdr `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$PWD\rtlsdr-install" `
            -DCMAKE_PREFIX_PATH="$PWD\rtlsdr-deps\Library" `
            "-DLIBUSB_INCLUDE_DIRS=$libusbInc" `
            "-DLIBUSB_LIBRARIES=$libusbLib" `
            -DINSTALL_UDEV_RULES=OFF `
            -DDETACH_KERNEL_DRIVER=OFF `
            -DBUILD_SHARED_LIBS=ON
          if ($LASTEXITCODE -ne 0) { throw "cmake configure librtlsdr failed" }
          # Build only the shared library — rtl_tcp/rtl_test utilities need
          # pthread.h which is unavailable on MSVC Windows runners.
          & $CMAKE --build rtlsdr-build --target rtlsdr
          if ($LASTEXITCODE -ne 0) { throw "cmake build librtlsdr failed" }

          Write-Host "=== rtlsdr-build contents ==="
          Get-ChildItem rtlsdr-build -Recurse -File | Select-Object FullName

          # --- Patch + Build SoapyRTLSDR linking against Osmocom librtlsdr + our SoapySDR ---
          git clone https://github.com/pothosware/SoapyRTLSDR --depth 1

          # Patch Registration.cpp via a script committed to the repo.
          # (Avoids PowerShell here-string / YAML indentation conflicts.)
          python scripts/patch_soapyrtlsdr_winusb.py
          if ($LASTEXITCODE -ne 0) { throw "SoapyRTLSDR Registration.cpp patch failed" }

          $rtlsdrLib = (Get-ChildItem rtlsdr-build -Recurse -Filter "rtlsdr.lib" | Select-Object -First 1).FullName
          Write-Host "rtlsdr.lib for SoapyRTLSDR: $rtlsdrLib"

          # Diagnose what was extracted into soapy-win64/sdk/ by extract_soapy_conda.py.
          Write-Host "=== soapy-win64/sdk contents ==="
          if (Test-Path "soapy-win64\sdk") {
            Get-ChildItem "soapy-win64\sdk" -Recurse -File | Select-Object FullName
          } else {
            Write-Host "  (directory not found)"
          }

          # Write a portable SoapySDRConfig.cmake via Python script.
          # (PowerShell here-strings start at column 0 and break YAML indentation.)
          # The conda cmake config has absolute paths baked in from conda build env
          # and fails when extracted; our script generates a portable config using
          # the actual paths of the extracted headers and SoapySDR.lib.
          python scripts/write_soapy_cmake_config.py --sdk-dir soapy-win64/sdk
          if ($LASTEXITCODE -ne 0) { throw "write_soapy_cmake_config.py failed" }

          # Use the cmake dir we just created as SoapySDR_DIR so find_package
          # picks it up directly without needing CMAKE_PREFIX_PATH scanning.
          & $CMAKE -G Ninja -B soapyrtlsdr-build -S SoapyRTLSDR `
            -DCMAKE_BUILD_TYPE=Release `
            "-DSoapySDR_DIR=$PWD\soapy-win64\sdk\lib\cmake\SoapySDR" `
            "-DCMAKE_PREFIX_PATH=$PWD\rtlsdr-deps\Library" `
            "-DRTLSDR_INCLUDE_DIR=$PWD\rtl-sdr\include" `
            "-DRTLSDR_LIBRARY=$rtlsdrLib"
          if ($LASTEXITCODE -ne 0) { throw "cmake configure SoapyRTLSDR failed" }
          & $CMAKE --build soapyrtlsdr-build
          if ($LASTEXITCODE -ne 0) { throw "cmake build SoapyRTLSDR failed" }

          Write-Host "=== soapyrtlsdr-build contents ==="
          Get-ChildItem soapyrtlsdr-build -Recurse -File | Select-Object FullName

          # --- Copy DLLs into soapy-win64 bundle ---
          # SoapyRTLSDR plugin is named rtlsdrSupport.dll (not SoapyRTLSDR.dll)
          $rtlsdrDll   = Get-ChildItem rtlsdr-build      -Recurse -Filter "rtlsdr.dll"        | Select-Object -First 1
          $soapyRtlDll = Get-ChildItem soapyrtlsdr-build -Recurse -Filter "rtlsdrSupport.dll" | Select-Object -First 1
          # libusb-1.0.dll is a runtime dependency of rtlsdr.dll
          $libusbDll   = Get-ChildItem "$PWD\rtlsdr-deps\Library\bin" -Filter "libusb-1.0.dll" | Select-Object -First 1
          if (-not $rtlsdrDll)   { throw "rtlsdr.dll not found after build" }
          if (-not $soapyRtlDll) { throw "rtlsdrSupport.dll not found after build" }
          Write-Host "rtlsdr.dll:        $($rtlsdrDll.FullName)"
          Write-Host "rtlsdrSupport.dll: $($soapyRtlDll.FullName)"
          Write-Host "libusb-1.0.dll:    $($libusbDll.FullName)"
          Copy-Item $rtlsdrDll.FullName   "soapy-win64\bin\rtlsdr.dll"           -Force
          Copy-Item $soapyRtlDll.FullName "soapy-win64\modules\rtlsdrSupport.dll" -Force
          if ($libusbDll) { Copy-Item $libusbDll.FullName "soapy-win64\bin\libusb-1.0.dll" -Force }
          Write-Host "RTL-SDR Osmocom source build installed into soapy-win64."

      - name: Download Direwolf bundle
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path direwolf-bundle | Out-Null
          gh release download direwolf-bundle `
            --repo "${{ github.repository }}" `
            --pattern "direwolf-windows-x86_64.zip" `
            --dir "$env:RUNNER_TEMP\dw-dl"
          Expand-Archive -Path "$env:RUNNER_TEMP\dw-dl\direwolf-windows-x86_64.zip" `
            -DestinationPath "$env:RUNNER_TEMP\dw-dl\dw-extracted"
          Copy-Item "$env:RUNNER_TEMP\dw-dl\dw-extracted\*" direwolf-bundle\ -Force
          $ver = Get-Content "direwolf-bundle\version.txt" -ErrorAction SilentlyContinue
          Write-Host "Direwolf version: $ver"

      - name: Download q65lib bundle
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path q65lib-bundle | Out-Null
          try {
            gh release download q65lib-bundle `
              --repo "${{ github.repository }}" `
              --pattern "q65lib-windows-x86_64.zip" `
              --dir "$env:RUNNER_TEMP\q65-dl"
            Expand-Archive -Path "$env:RUNNER_TEMP\q65-dl\q65lib-windows-x86_64.zip" `
              -DestinationPath "$env:RUNNER_TEMP\q65-dl\q65-extracted"
            Copy-Item "$env:RUNNER_TEMP\q65-dl\q65-extracted\*" q65lib-bundle\ -Force
            $ver = Get-Content "q65lib-bundle\version.txt" -ErrorAction SilentlyContinue
            Write-Host "q65lib version: $ver"
          } catch {
            Write-Host "q65lib bundle not found; skipping (Q65 decode disabled in this build)"
          }

      - name: Disable Windows Defender and install NSIS
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          # Detect NSIS in common install locations (path varies by runner image).
          $nsisCandidates = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          )
          $makensis = $nsisCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($makensis) {
            Write-Host "NSIS already installed: $makensis"
          } else {
            Write-Host "NSIS not found, installing via Chocolatey..."
            $maxRetries = 3
            for ($i = 1; $i -le $maxRetries; $i++) {
              choco install nsis -y --no-progress
              if ($LASTEXITCODE -eq 0) { Write-Host "NSIS installed successfully"; break }
              if ($i -lt $maxRetries) {
                Write-Host "Attempt $i failed, retrying in 15 seconds..."
                Start-Sleep -Seconds 15
              } else {
                throw "NSIS installation failed after $maxRetries attempts"
              }
            }
            $makensis = $nsisCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $makensis) { throw "makensis.exe not found after install" }
          # Persist the NSIS directory to PATH for subsequent steps via GITHUB_PATH.
          $nsisDir = Split-Path $makensis
          Write-Host "Adding NSIS dir to GITHUB_PATH: $nsisDir"
          "$nsisDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          $ver | Out-File -FilePath src\version.txt -Encoding ASCII -NoNewline
          $env:PYTHONPATH = "src"
          pyinstaller scripts/fbsat59.spec --noconfirm --distpath dist
          if ($LASTEXITCODE -ne 0) { throw "pyinstaller failed" }
          $count = (Get-ChildItem dist -Recurse -File -ErrorAction SilentlyContinue).Count
          Write-Host "=== dist after PyInstaller: $count files ==="
          if ($count -eq 0) { throw "PyInstaller produced empty dist" }

      - name: Build NSIS installer
        shell: pwsh
        run: |
          Write-Host "makensis path: $((Get-Command makensis -ErrorAction SilentlyContinue)?.Source)"
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          # VIProductVersion requires X.X.X.X numeric format; strip pre-release suffix
          $numericVer = ($ver -replace '-.*$', '')
          $parts = $numericVer.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $viVer = ($parts[0..3] -join '.')
          makensis /DAPP_VERSION=$ver /DVIVERSION=$viVer scripts\installer.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed" }
          Write-Host "Installer built: dist\FBSAT59-Setup.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/FBSAT59-Setup.exe

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: dist/FBSAT59-Setup.exe
          make_latest: true
          overwrite_files: true

      - name: Upload Hamlib bundle to hamlib-bundle release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $exists = gh release view hamlib-bundle `
            --repo "${{ github.repository }}" 2>$null
          if (-not $exists) {
            gh release create hamlib-bundle `
              --repo "${{ github.repository }}" `
              --title "Hamlib Bundle" `
              --notes "Pre-built Hamlib for use with Help > Hamlib Update…" `
              --prerelease
          }
          gh release upload hamlib-bundle `
            --repo "${{ github.repository }}" `
            --clobber `
            "${{ env.HAMLIB_PORTABLE_PKG }}"

  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-14
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hamlib and Python dependencies
        run: |
          # Install build tools via Homebrew (swig generates hamlib_wrap.c from .swg)
          brew install autoconf automake libtool pkg-config libusb dylibbundler swig

          HAMLIB_VER="4.7.1"
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          PYTAG=$(python3 -c "import sys; print(f'py{sys.version_info.major}{sys.version_info.minor}')")
          ARCH=$(uname -m)  # arm64 or x86_64

          PY_INC=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))")
          PY_EXT=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('EXT_SUFFIX'))")

          # Download Hamlib source
          wget -q https://github.com/Hamlib/Hamlib/releases/download/${HAMLIB_VER}/hamlib-${HAMLIB_VER}.tar.gz
          tar -xzf hamlib-${HAMLIB_VER}.tar.gz

          echo "=== bindings/ ===" && ls hamlib-${HAMLIB_VER}/bindings/

          # --- Build 1: for PyInstaller bundle (standard prefix) ---
          cd hamlib-${HAMLIB_VER}
          ./configure --prefix=/usr/local/hamlib-bundle --disable-static
          make -j$(sysctl -n hw.logicalcpu)
          sudo make install
          cd ..

          # Generate SWIG Python wrapper from .swg sources
          # Note: -I flags must NOT have spaces between -I and the path
          swig -python -Wall \
            -I/usr/local/hamlib-bundle/include \
            -Ihamlib-${HAMLIB_VER}/bindings \
            -o hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -outdir hamlib-${HAMLIB_VER}/bindings \
            hamlib-${HAMLIB_VER}/bindings/hamlib.swg

          BUNDLED_PYSITE=/usr/local/hamlib-bundle/lib/python${PYVER}/site-packages
          sudo mkdir -p ${BUNDLED_PYSITE}
          sudo clang -shared -fPIC -O2 \
            -undefined dynamic_lookup \
            -I/usr/local/hamlib-bundle/include \
            -Ihamlib-${HAMLIB_VER}/include \
            -I${PY_INC} \
            hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -L/usr/local/hamlib-bundle/lib \
            -lhamlib \
            -Wl,-rpath,/usr/local/hamlib-bundle/lib \
            -o ${BUNDLED_PYSITE}/_Hamlib${PY_EXT}
          sudo cp hamlib-${HAMLIB_VER}/bindings/Hamlib.py ${BUNDLED_PYSITE}/

          # Copy bindings into CI Python's site-packages and verify
          PY_SITE=$(python3 -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          cp ${BUNDLED_PYSITE}/Hamlib.py ${PY_SITE}/
          cp ${BUNDLED_PYSITE}/_Hamlib${PY_EXT} ${PY_SITE}/
          DYLD_LIBRARY_PATH=/usr/local/hamlib-bundle/lib python3 -c "import Hamlib; print('Hamlib version:', Hamlib.hamlib_version)"

          # --- Build 2: portable with @loader_path for in-app user update ---
          cd hamlib-${HAMLIB_VER}
          make clean
          ./configure \
            --prefix=$HOME/hamlib-portable-mac \
            --disable-static \
            LDFLAGS="-Wl,-rpath,@loader_path"
          make -j$(sysctl -n hw.logicalcpu)
          make install
          cd ..

          # Compile portable Python binding (reuse SWIG-generated files)
          PORT_PYSITE=$HOME/hamlib-portable-mac/lib/python${PYVER}/site-packages
          mkdir -p ${PORT_PYSITE}
          clang -shared -fPIC -O2 \
            -undefined dynamic_lookup \
            -I$HOME/hamlib-portable-mac/include \
            -Ihamlib-${HAMLIB_VER}/include \
            -I${PY_INC} \
            hamlib-${HAMLIB_VER}/bindings/hamlib_wrap.c \
            -L$HOME/hamlib-portable-mac/lib \
            -lhamlib \
            -Wl,-rpath,@loader_path \
            -o ${PORT_PYSITE}/_Hamlib${PY_EXT}
          cp hamlib-${HAMLIB_VER}/bindings/Hamlib.py ${PORT_PYSITE}/

          PORTABLE_LIB=$HOME/hamlib-portable-mac/lib
          HAMLIB_SO=${PORT_PYSITE}/_Hamlib${PY_EXT}

          # Fix transitive dylib dependencies using dylibbundler so
          # the .so loads without Homebrew installed on the end user's machine.
          dylibbundler \
            --bundle-deps \
            --fix-file ${HAMLIB_SO} \
            --dest-dir ${PORTABLE_LIB}/deps \
            --install-path @loader_path/../deps \
            --overwrite-dir

          # Package flat: all dylibs + Hamlib.py + _Hamlib.so in one directory
          PKG="hamlib-macos-${ARCH}-${PYTAG}-${HAMLIB_VER}"
          mkdir -p ${PKG}
          cp ${PORT_PYSITE}/Hamlib.py ${PKG}/
          cp ${PORT_PYSITE}/_Hamlib${PY_EXT} ${PKG}/
          cp ${PORTABLE_LIB}/*.dylib ${PKG}/ 2>/dev/null || true
          # Fix rpath inside _Hamlib.so to point to @loader_path (flat layout)
          install_name_tool -add_rpath @loader_path "${PKG}/_Hamlib${PY_EXT}" 2>/dev/null || true
          echo "${HAMLIB_VER}" > ${PKG}/version.txt
          tar -czf ${PKG}.tar.gz ${PKG}/
          echo "HAMLIB_PORTABLE_PKG=${PKG}.tar.gz" >> $GITHUB_ENV

          pip install -e ".[packaging]"

      - name: Download Direwolf bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(uname -m)
          mkdir -p direwolf-bundle
          gh release download direwolf-bundle \
            --repo "${{ github.repository }}" \
            --pattern "direwolf-macos-${ARCH}.tar.gz" \
            --dir /tmp/dw-dl
          tar -xzf /tmp/dw-dl/direwolf-macos-${ARCH}.tar.gz -C /tmp/dw-dl
          cp /tmp/dw-dl/direwolf direwolf-bundle/
          cp /tmp/dw-dl/*.dylib direwolf-bundle/ 2>/dev/null || true
          chmod +x direwolf-bundle/direwolf
          echo "Direwolf version: $(cat /tmp/dw-dl/version.txt)"

      - name: Download q65lib bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(uname -m)
          mkdir -p q65lib-bundle
          gh release download q65lib-bundle \
            --repo "${{ github.repository }}" \
            --pattern "q65lib-macos-${ARCH}.tar.gz" \
            --dir /tmp/q65-dl 2>/dev/null || { echo "q65lib bundle not found; skipping"; exit 0; }
          tar -xzf /tmp/q65-dl/q65lib-macos-${ARCH}.tar.gz -C /tmp/q65-dl
          cp /tmp/q65-dl/*.dylib q65lib-bundle/ 2>/dev/null || true
          echo "q65lib version: $(cat /tmp/q65-dl/version.txt 2>/dev/null || echo unknown)"

      - name: Build with PyInstaller
        run: |
          echo "${{ github.ref_name }}" | sed 's/^v//' > src/version.txt
          PYTHONPATH=src pyinstaller scripts/fbsat59.spec --noconfirm

      - name: Create DMG
        run: bash scripts/build-dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/FBSAT59.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: dist/FBSAT59.dmg
          make_latest: true

      - name: Upload Hamlib bundle to hamlib-bundle release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view hamlib-bundle \
            --repo "${{ github.repository }}" 2>/dev/null || \
          gh release create hamlib-bundle \
            --repo "${{ github.repository }}" \
            --title "Hamlib Bundle" \
            --notes "Pre-built Hamlib for use with Help > Hamlib Update…" \
            --prerelease
          gh release upload hamlib-bundle \
            --repo "${{ github.repository }}" \
            --clobber \
            "${{ env.HAMLIB_PORTABLE_PKG }}"

  # Direwolf ビルドは build-direwolf.yml（週次自動チェック）に移行済み。
  # タグ push 時には direwolf-bundle リリースから取得してアプリに同梱する。
