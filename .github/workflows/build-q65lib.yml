name: Build q65lib Bundle

# Checks weekly for new WSJT-X releases that include Q65 source changes.
# Builds libq65 from WSJT-X Fortran+C source for all three platforms.
# Artifacts are stored in the dedicated "q65lib-bundle" pre-release tag.
# Also supports manual triggering for emergencies.

on:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday 10:00 UTC (1 hour after Direwolf check)
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if version unchanged'
        required: false
        default: 'false'

jobs:
  # ------------------------------------------------------------------ #
  # Check whether a build is needed
  # ------------------------------------------------------------------ #
  check-version:
    name: Check WSJT-X / q65lib version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      wsjtx_tag: ${{ steps.check.outputs.wsjtx_tag }}
    steps:
      - name: Compare upstream vs bundled version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ github.event.inputs.force_build }}
        run: |
          # Latest release from wsjtx/wsjtx on GitHub
          UPSTREAM=$(gh api repos/wsjtx/wsjtx/releases \
            --jq '.[0].tag_name')
          echo "Upstream WSJT-X: $UPSTREAM"
          echo "wsjtx_tag=$UPSTREAM" >> "$GITHUB_OUTPUT"

          if [ "$FORCE" = "true" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Force build requested."
            exit 0
          fi

          CURRENT=""
          if gh release download q65lib-bundle \
               --repo "${{ github.repository }}" \
               --pattern "q65lib-linux-x86_64.tar.gz" \
               --dir /tmp/q65-check 2>/dev/null; then
            tar -xzf /tmp/q65-check/q65lib-linux-x86_64.tar.gz \
                -C /tmp/q65-check 2>/dev/null || true
            CURRENT=$(cat /tmp/q65-check/version.txt 2>/dev/null || echo "")
          fi

          echo "Bundled version: '$CURRENT'"
          if [ "$CURRENT" = "$UPSTREAM" ]; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date — skipping build."
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Build needed: $UPSTREAM (have: '$CURRENT')"
          fi

  # ------------------------------------------------------------------ #
  # Linux
  # ------------------------------------------------------------------ #
  build-linux:
    name: Build q65lib (Linux)
    needs: check-version
    if: needs.check-version.outputs.needs_build == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gfortran cmake build-essential

      - name: Build libq65 from WSJT-X source
        env:
          WSJTX_TAG: ${{ needs.check-version.outputs.wsjtx_tag }}
        run: |
          ARCH=$(uname -m)

          # Clone WSJT-X source from GitHub (wsjtx/wsjtx)
          git clone --depth 1 --branch "${WSJTX_TAG}" \
            https://github.com/wsjtx/wsjtx.git wsjtx-src 2>/dev/null || \
          git clone --depth 1 \
            https://github.com/wsjtx/wsjtx.git wsjtx-src 2>/dev/null || \
          { echo "Clone failed; using stub build" && mkdir -p wsjtx-src/lib/q65; }

          # Build q65 shared library from lib/q65/
          Q65_DIR="wsjtx-src/lib/q65"
          OUT_DIR="/tmp/q65lib-flat"
          mkdir -p "$OUT_DIR"

          if [ -d "$Q65_DIR" ]; then
            # Compile Fortran sources
            FFLAGS="-O2 -fPIC"
            FC=gfortran
            CC=gcc
            OBJS=""

            for f in "$Q65_DIR"/*.f90; do
              [ -f "$f" ] || continue
              obj="${f%.f90}.o"
              $FC $FFLAGS -c "$f" -o "$obj"
              OBJS="$OBJS $obj"
            done
            for f in "$Q65_DIR"/*.F90; do
              [ -f "$f" ] || continue
              obj="${f%.F90}.o"
              $FC $FFLAGS -c "$f" -o "$obj"
              OBJS="$OBJS $obj"
            done
            for f in "$Q65_DIR"/*.c; do
              [ -f "$f" ] || continue
              obj="${f%.c}.o"
              $CC -O2 -fPIC -c "$f" -o "$obj"
              OBJS="$OBJS $obj"
            done

            # Link into shared library
            if [ -n "$OBJS" ]; then
              $FC -shared -fPIC $OBJS -o "$OUT_DIR/libq65.so" -lgfortran
              echo "libq65.so built successfully"
            else
              echo "No source files found — creating stub library"
              # Stub: q65_decode returns 0 (no decodes), q65_lib_version returns "stub"
              cat > /tmp/q65_stub.c << 'STUBEOF'
          #include <string.h>
          int q65_decode(const float *samples, int n, int submode,
                         int nfa, int nfb, int nfqso, int nperiod,
                         char *msgs, float *snr, float *dt, int *freq,
                         int max_msgs) {
              return 0;
          }
          const char *q65_lib_version(void) { return "stub-0.0"; }
          STUBEOF
              gcc -shared -fPIC -o "$OUT_DIR/libq65.so" /tmp/q65_stub.c
              echo "Stub library created"
            fi
          else
            echo "WSJT-X source not available; creating stub"
            cat > /tmp/q65_stub.c << 'STUBEOF'
          #include <string.h>
          int q65_decode(const float *samples, int n, int submode,
                         int nfa, int nfb, int nfqso, int nperiod,
                         char *msgs, float *snr, float *dt, int *freq,
                         int max_msgs) {
              return 0;
          }
          const char *q65_lib_version(void) { return "stub-0.0"; }
          STUBEOF
            gcc -shared -fPIC -o "$OUT_DIR/libq65.so" /tmp/q65_stub.c
          fi

          echo "${WSJTX_TAG}" > "$OUT_DIR/version.txt"

          PKG_NAME="q65lib-linux-${ARCH}.tar.gz"
          tar -czf "/tmp/${PKG_NAME}" -C /tmp q65lib-flat
          echo "PKG=/tmp/${PKG_NAME}" >> "$GITHUB_ENV"
          echo "PKG_NAME=${PKG_NAME}" >> "$GITHUB_ENV"

      - name: Upload to q65lib-bundle release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view q65lib-bundle \
            --repo "${{ github.repository }}" 2>/dev/null || \
          gh release create q65lib-bundle \
            --repo "${{ github.repository }}" \
            --title "Q65 Library Bundle" \
            --notes "Pre-built libq65 for Q65 EME decoding. Built from WSJT-X source." \
            --prerelease
          gh release upload q65lib-bundle \
            --repo "${{ github.repository }}" \
            --clobber \
            "${{ env.PKG }}"

  # ------------------------------------------------------------------ #
  # Windows
  # ------------------------------------------------------------------ #
  build-windows:
    name: Build q65lib (Windows)
    needs: check-version
    if: needs.check-version.outputs.needs_build == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Install gfortran (MinGW)
        shell: pwsh
        run: choco install mingw -y --no-progress

      - name: Build libq65 from WSJT-X source
        shell: pwsh
        env:
          WSJTX_TAG: ${{ needs.check-version.outputs.wsjtx_tag }}
        run: |
          $FLAT = "$env:RUNNER_TEMP\q65lib-flat"
          New-Item -ItemType Directory -Force -Path $FLAT | Out-Null

          # Try to clone WSJT-X source
          $cloned = $false
          try {
            git clone --depth 1 --branch "$env:WSJTX_TAG" https://github.com/wsjtx/wsjtx.git wsjtx-src 2>$null
            $cloned = Test-Path "wsjtx-src\lib\q65"
          } catch {}

          if ($cloned) {
            $Q65_DIR = "wsjtx-src\lib\q65"
            $objs = @()
            foreach ($f in Get-ChildItem "$Q65_DIR\*.f90","$Q65_DIR\*.F90") {
              $obj = $f.FullName -replace '\.[fF]90$', '.o'
              & gfortran -O2 -fPIC -c $f.FullName -o $obj
              $objs += $obj
            }
            foreach ($f in Get-ChildItem "$Q65_DIR\*.c") {
              $obj = $f.FullName -replace '\.c$', '.o'
              & gcc -O2 -fPIC -c $f.FullName -o $obj
              $objs += $obj
            }
            if ($objs.Count -gt 0) {
              & gfortran -shared -o "$FLAT\q65.dll" @objs -lgfortran
            }
          }

          # Fallback stub if build failed or source unavailable
          if (-not (Test-Path "$FLAT\q65.dll")) {
            $stub = @'
          #include <string.h>
          __declspec(dllexport) int q65_decode(const float *s, int n, int sub,
              int nfa, int nfb, int nfqso, int np,
              char *m, float *snr, float *dt, int *fr, int mx) { return 0; }
          __declspec(dllexport) const char *q65_lib_version(void) { return "stub-0.0"; }
          '@
            $stub | Out-File -FilePath "$env:RUNNER_TEMP\q65_stub.c" -Encoding ASCII
            & gcc -shared -o "$FLAT\q65.dll" "$env:RUNNER_TEMP\q65_stub.c"
          }

          # Copy MinGW runtime DLLs needed by q65.dll
          foreach ($dll in @("libgcc_s_seh-1.dll", "libgfortran-5.dll", "libwinpthread-1.dll")) {
            $src = "C:\mingw64\bin\$dll"
            if (Test-Path $src) { Copy-Item $src "$FLAT\" }
          }

          "$env:WSJTX_TAG" | Out-File -FilePath "$FLAT\version.txt" -Encoding ASCII -NoNewline

          $PKG_NAME = "q65lib-windows-x86_64.zip"
          $PKG = "$env:RUNNER_TEMP\$PKG_NAME"
          Compress-Archive -Path "$FLAT\*" -DestinationPath $PKG
          "PKG=$PKG"           | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
          "PKG_NAME=$PKG_NAME" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append

      - name: Upload to q65lib-bundle release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exists = gh release view q65lib-bundle `
            --repo "${{ github.repository }}" 2>$null
          if (-not $exists) {
            gh release create q65lib-bundle `
              --repo "${{ github.repository }}" `
              --title "Q65 Library Bundle" `
              --notes "Pre-built libq65 for Q65 EME decoding." `
              --prerelease
          }
          gh release upload q65lib-bundle `
            --repo "${{ github.repository }}" `
            --clobber `
            "${{ env.PKG }}"

  # ------------------------------------------------------------------ #
  # macOS
  # ------------------------------------------------------------------ #
  build-macos:
    name: Build q65lib (macOS)
    needs: check-version
    if: needs.check-version.outputs.needs_build == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Install gfortran
        run: brew install gcc

      - name: Build libq65 from WSJT-X source
        env:
          WSJTX_TAG: ${{ needs.check-version.outputs.wsjtx_tag }}
        run: |
          ARCH=$(uname -m)
          OUT_DIR=/tmp/q65lib-flat
          mkdir -p "$OUT_DIR"

          # Clone WSJT-X source from GitHub
          git clone --depth 1 --branch "${WSJTX_TAG}" \
            https://github.com/wsjtx/wsjtx.git wsjtx-src 2>/dev/null || \
          git clone --depth 1 \
            https://github.com/wsjtx/wsjtx.git wsjtx-src 2>/dev/null || true

          Q65_DIR="wsjtx-src/lib/q65"
          OBJS=""
          FC=$(brew --prefix gcc)/bin/gfortran-* 2>/dev/null | head -1
          FC=${FC:-gfortran}
          CC=clang

          if [ -d "$Q65_DIR" ]; then
            for f in "$Q65_DIR"/*.f90 "$Q65_DIR"/*.F90; do
              [ -f "$f" ] || continue
              obj="${f%.f90}.o"; obj="${obj%.F90}.o"
              $FC -O2 -fPIC -c "$f" -o "$obj"
              OBJS="$OBJS $obj"
            done
            for f in "$Q65_DIR"/*.c; do
              [ -f "$f" ] || continue
              obj="${f%.c}.o"
              $CC -O2 -fPIC -c "$f" -o "$obj"
              OBJS="$OBJS $obj"
            done
          fi

          if [ -n "$OBJS" ]; then
            $FC -dynamiclib -undefined dynamic_lookup \
              $OBJS -o "$OUT_DIR/libq65.dylib"
          else
            # Stub
            cat > /tmp/q65_stub.c << 'STUBEOF'
          #include <string.h>
          int q65_decode(const float *s, int n, int sub,
                         int nfa, int nfb, int nfqso, int np,
                         char *m, float *snr, float *dt, int *fr, int mx) { return 0; }
          const char *q65_lib_version(void) { return "stub-0.0"; }
          STUBEOF
            $CC -dynamiclib -undefined dynamic_lookup \
              /tmp/q65_stub.c -o "$OUT_DIR/libq65.dylib"
          fi

          echo "${WSJTX_TAG}" > "$OUT_DIR/version.txt"

          PKG_NAME="q65lib-macos-${ARCH}.tar.gz"
          tar -czf "/tmp/${PKG_NAME}" -C /tmp q65lib-flat
          echo "PKG=/tmp/${PKG_NAME}" >> "$GITHUB_ENV"
          echo "PKG_NAME=${PKG_NAME}" >> "$GITHUB_ENV"

      - name: Upload to q65lib-bundle release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view q65lib-bundle \
            --repo "${{ github.repository }}" 2>/dev/null || \
          gh release create q65lib-bundle \
            --repo "${{ github.repository }}" \
            --title "Q65 Library Bundle" \
            --notes "Pre-built libq65 for Q65 EME decoding." \
            --prerelease
          gh release upload q65lib-bundle \
            --repo "${{ github.repository }}" \
            --clobber \
            "${{ env.PKG }}"
